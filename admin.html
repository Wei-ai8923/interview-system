<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逗點集團｜面試後台管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1D6FD8;--blue-dark:#1558B0;--blue-light:#EBF3FF;
  --bg:#F4F7FB;--white:#FFFFFF;
  --border:#DDE4EF;--border2:#C8D6EE;
  --text:#1A2338;--text2:#4B5C7A;--text3:#8898B4;
  --green:#059669;--red:#DC2626;--amber:#D97706;
  --shadow:0 1px 4px rgba(29,111,216,.08);
  --shadow-md:0 4px 16px rgba(29,111,216,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.page{display:none!important;}
.page.active{display:block!important;}
#page-login.active{display:flex!important;}

#page-login{min-height:100vh;background:linear-gradient(135deg,#EBF3FF 0%,#F4F7FB 60%,#E8F0FE 100%);align-items:center;justify-content:center;}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(29,111,216,.14);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo img{height:72px;width:72px;object-fit:cover;border-radius:50%;}
.login-title{font-size:22px;font-weight:900;color:var(--text);text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.06em;}
.form-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-weight:500;color:var(--text);outline:none;transition:all .2s;font-family:'Noto Sans TC',sans-serif;}
.form-input:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(29,111,216,.1);}
.form-input::placeholder{color:var(--text3);}
.btn-login{width:100%;background:var(--blue);color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s;margin-top:4px;font-family:'Noto Sans TC',sans-serif;box-shadow:0 4px 12px rgba(29,111,216,.3);}
.btn-login:hover{background:var(--blue-dark);transform:translateY(-1px);}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;}

.admin-header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(29,111,216,.06);}
.header-inner{max-width:1400px;margin:0 auto;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo-img{height:36px;width:36px;object-fit:cover;border-radius:50%;}
.header-title{font-size:15px;font-weight:900;color:var(--text);}
.header-sub{font-size:11px;color:var(--text3);}
.header-nav{display:flex;gap:8px;align-items:center;}
.nav-btn{padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;border:1.5px solid transparent;}
.nav-btn-outline{background:transparent;border-color:var(--border2);color:var(--text2);}
.nav-btn-outline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.nav-btn-ghost{background:transparent;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.nav-btn-ghost:hover{color:var(--text);}

.admin-main{max-width:1400px;margin:0 auto;padding:20px 24px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);transition:box-shadow .2s;}
.stat-card:hover{box-shadow:var(--shadow-md);}
.stat-label{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.stat-value{font-size:30px;font-weight:900;}

.filter-bar{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;box-shadow:var(--shadow);}
.filter-group label{display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.filter-input{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.filter-input:focus{border-color:var(--blue);background:var(--white);}

.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.table-header{background:var(--bg);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.table-header-title{font-size:13px;font-weight:700;color:var(--text);}
.table-count{font-size:11px;color:var(--text3);}
.tbl{width:100%;border-collapse:collapse;min-width:920px;}
.tbl th{background:var(--bg);padding:10px 12px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);letter-spacing:.03em;text-transform:uppercase;}
.tbl td{padding:11px 12px;border-bottom:1px solid rgba(221,228,239,.5);font-size:13px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--blue-light);}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-draft{background:#F1F5F9;color:#64748B;border:1px solid #E2E8F0;}
.badge-complete{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;}
.badge-pass{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;}
.badge-fail{background:#FEF2F2;color:#7F1D1D;border:1px solid #FECACA;}
.badge-pending{background:#FFFBEB;color:#78350F;border:1px solid #FDE68A;}
.candidate-name{font-weight:900;color:var(--blue);}
.total-score{font-weight:900;font-size:16px;color:var(--blue);}
.action-btns{display:flex;gap:6px;}
.btn-action{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;border:1.5px solid transparent;}
.btn-edit{background:var(--bg);border-color:var(--border2);color:var(--text2);}
.btn-edit:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.btn-delete{background:#FEF2F2;border-color:#FECACA;color:#B91C1C;}
.btn-delete:hover{background:#FEE2E2;border-color:#EF4444;}
.overflow-wrap{overflow-x:auto;}

#toast{position:fixed;top:68px;right:20px;background:var(--white);border:1.5px solid var(--blue);color:var(--blue);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;transform:translateX(150%);transition:transform .3s;z-index:9999;box-shadow:var(--shadow-md);}
#toast.show{transform:translateX(0);}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="page-login" class="page active">
  <div class="login-card">
    <div class="login-logo">
      <img id="login-logo-img" src="00逗點教室_各分校校徽_頭貼_總部.png" alt="逗點教室">
    </div>
    <div class="login-title">後台管理系統</div>
    <div class="login-sub">逗點集團面試資料後台</div>
    <div class="form-group">
      <label class="form-label">員工編號</label>
      <input type="text" id="login-emp" class="form-input" placeholder="例：F00035"
        style="text-transform:uppercase;" autocomplete="off"
        onkeydown="if(event.key==='Enter')document.getElementById('login-pwd').focus()">
    </div>
    <div class="form-group">
      <label class="form-label">登入密碼</label>
      <input type="password" id="login-pwd" class="form-input" placeholder="請輸入密碼"
        onkeydown="if(event.key==='Enter')adminLogin()">
    </div>
    <button class="btn-login" id="btn-login-main" onclick="adminLogin()">進 入 後 台</button>
    <div class="login-hint">測試密碼：0000</div>
  </div>
</div>

<!-- ADMIN -->
<div id="page-admin" class="page">
  <header class="admin-header">
    <div class="header-inner">
      <div class="header-left">
        <img id="header-logo-img" src="00逗點教室_各分校校徽_頭貼_總部.png" class="header-logo-img" alt="">
        <div>
          <div class="header-title">面試後台管理</div>
          <div class="header-sub" id="admin-subtitle"></div>
        </div>
      </div>
      <div class="header-nav">
        <button class="nav-btn nav-btn-outline" onclick="goFront()">前台評分</button>
        <button class="nav-btn-ghost" onclick="adminLogout()">登出</button>
      </div>
    </div>
  </header>

  <div class="admin-main">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">總面試筆數</div><div class="stat-value" id="stat-total" style="color:var(--blue);">0</div></div>
      <div class="stat-card"><div class="stat-label">錄取人數</div><div class="stat-value" id="stat-pass" style="color:var(--green);">0</div></div>
      <div class="stat-card"><div class="stat-label">不錄取人數</div><div class="stat-value" id="stat-fail" style="color:var(--red);">0</div></div>
      <div class="stat-card"><div class="stat-label">平均總分</div><div class="stat-value" id="stat-avg" style="color:var(--amber);">-</div></div>
    </div>

    <div class="filter-bar">
      <div class="filter-group"><label>搜尋姓名</label><input type="text" id="filter-name" class="filter-input" placeholder="應徵者姓名" oninput="renderTable()" style="width:140px;"></div>
      <div class="filter-group" id="branch-filter-wrap"><label>篩選單位</label><select id="filter-branch" class="filter-input" onchange="renderTable()"><option value="">全部單位</option></select></div>
      <div class="filter-group"><label>篩選結果</label><select id="filter-decision" class="filter-input" onchange="renderTable()"><option value="">全部結果</option><option value="pass">錄取</option><option value="fail">不錄取</option></select></div>
      <div class="filter-group"><label>篩選狀態</label><select id="filter-status" class="filter-input" onchange="renderTable()"><option value="">全部狀態</option><option value="draft">暫存中</option><option value="completed">已完成</option></select></div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <span class="table-header-title">面試紀錄</span>
        <span class="table-count" id="table-count"></span>
      </div>
      <div class="overflow-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th>面試日期</th><th>應徵者</th><th>分校/單位</th><th>職位</th><th>面試官</th>
              <th style="color:#059669;">筆試</th><th style="color:#D97706;">職能</th>
              <th style="color:#4F46E5;">外顯</th><th style="color:var(--blue);">總分</th>
              <th>狀態</th><th>結果</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="admin-tbody">
            <tr><td colspan="12" style="text-align:center;padding:48px;color:var(--text3);font-size:13px;font-weight:700;">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://yslzhijwfbhgropbmqab.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbHpoaWp3ZmJoZ3JvcGJtcWFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTg0NjksImV4cCI6MjA5MTI5NDQ2OX0.UUm9ShB9vd1PSGxLlW5kOwI5rzle1O2WYKmZcjE9Ksc';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const BRANCH_LOGO={
  '青埔翱翔校':'翱翔.png','青埔升大校':'升大.png','青園展翅校':'展翅.png',
  '大園晨光校':'晨光.png','內壢森耀校':'內壢森耀校.png','竹北知行校':'竹北知行校.png',
  '文化極光校':'極光.png','快樂騰雲校':'00逗點教室_各分校校徽_頭貼_總部.png',
  '大園參天校':'參天.png','園中方舟校':'方舟.png','青埔旭日校':'旭日.png',
  '中壢心夢想校':'心夢想.png',
};
function getBranchLogo(dept){return BRANCH_LOGO[dept]||'00逗點教室_各分校校徽_頭貼_總部.png';}

const EMP_DB={
  "F00001":{name:"徐暘智",dept:"逗點集團",role:"ADMIN"},
  "F00003":{name:"劉芸諺",dept:"行政溝通處",role:"MGR"},
  "F00004":{name:"黃乙凡",dept:"國高中營運處",role:"SENIOR_HS"},
  "F00005":{name:"黃倪睨",dept:"國小營運處",role:"SENIOR_ES"},
  "F00007":{name:"黃偉婷",dept:"青園展翅校",role:"MGR"},
  "F00008":{name:"游立銘",dept:"中壢心夢想校",role:"MGR"},
  "F00009":{name:"林思誼",dept:"園中方舟校",role:"MGR"},
  "F00010":{name:"李安琇",dept:"青埔翱翔校",role:"MGR"},
  "F00012":{name:"陳映竹",dept:"青埔旭日校",role:"MGR"},
  "F00016":{name:"古欣平",dept:"文化極光校",role:"MGR"},
  "F00022":{name:"鄒瑞紋",dept:"大園參天校",role:"MGR"},
  "F00029":{name:"王欣俞",dept:"竹北知行校",role:"MGR"},
  "F00031":{name:"許芳茹",dept:"大園晨光校",role:"MGR"},
  "F00035":{name:"魏詩珊",dept:"人力資源處",role:"HR"},
  "F00054":{name:"曾佳敏",dept:"人力資源處",role:"HR"},
  "F00059":{name:"應羽涵",dept:"國小英文管理科",role:"MGR"},
  "F00070":{name:"林依屏",dept:"青埔升大校",role:"MGR"},
  "F00081":{name:"廖依珊",dept:"產品研發處",role:"MGR"},
  "F00084":{name:"巫珮菱",dept:"內壢森耀校",role:"MGR"},
  "F00086":{name:"呂鈺嬋",dept:"國高中營運處",role:"MGR"},
  "F00092":{name:"蔡玉晴",dept:"快樂騰雲校",role:"MGR"}
};

const HS_BRANCHES=["中壢心夢想校","園中方舟校","青埔旭日校","大園參天校","青埔升大校","國高中營運處"];
const ES_BRANCHES=["青園展翅校","青埔翱翔校","大園晨光校","內壢森耀校","竹北知行校","文化極光校","快樂騰雲校","國小營運處"];

let currentUser=null,allData=[];

window.onload=async()=>{
  const params=new URLSearchParams(window.location.search);
  const empId=params.get('emp');
  if(empId&&EMP_DB[empId]){
    currentUser={...EMP_DB[empId],id:empId};
    await loadAndShow();
    window.history.replaceState({},'',window.location.pathname);
  }
};

async function adminLogin(){
  const empId=document.getElementById('login-emp').value.trim().toUpperCase();
  const pwd=document.getElementById('login-pwd').value.trim();
  if(!empId)return alert('請輸入員工編號');
  if(pwd!=='0000')return alert('密碼錯誤（測試密碼：0000）');
  if(!EMP_DB[empId])return alert('查無此員工編號');
  currentUser={...EMP_DB[empId],id:empId};
  const btn=document.getElementById('btn-login-main');
  btn.textContent='登入中...';btn.disabled=true;
  await loadAndShow();
  btn.textContent='進 入 後 台';btn.disabled=false;
}

async function loadAndShow(){
  await loadData();
  // 更新 Logo
  const logoSrc=getBranchLogo(currentUser.dept);
  document.getElementById('login-logo-img').src=logoSrc;
  document.getElementById('header-logo-img').src=logoSrc;
  // 切換頁面
  document.getElementById('page-login').classList.remove('active');
  document.getElementById('page-admin').classList.add('active');
  const roleLabel=['HR','ADMIN'].includes(currentUser.role)?'人資/管理員 — 全公司資料':
    currentUser.role==='SENIOR_HS'?'國高中營運處 — 國高中各校':
    currentUser.role==='SENIOR_ES'?'國小營運處 — 國小各校':
    `${currentUser.dept} — 本單位資料`;
  document.getElementById('admin-subtitle').textContent=`${currentUser.name}（${currentUser.dept}）| ${roleLabel}`;
  if(['HR','ADMIN','SENIOR_HS','SENIOR_ES'].includes(currentUser.role)){populateBranchFilter();}
  else{document.getElementById('branch-filter-wrap').style.display='none';}
  renderTable();
}

async function loadData(){
  let q=sb.from('interviews').select('*').order('created_at',{ascending:false});
  if(currentUser.role==='SENIOR_HS')q=q.in('branch',HS_BRANCHES);
  else if(currentUser.role==='SENIOR_ES')q=q.in('branch',ES_BRANCHES);
  else if(!['HR','ADMIN'].includes(currentUser.role))q=q.eq('branch',currentUser.dept);
  const{data,error}=await q;
  if(error){alert('載入失敗：'+error.message);return;}
  allData=data||[];
}

function populateBranchFilter(){
  const sel=document.getElementById('filter-branch');
  // 清除舊的選項（保留第一個"全部單位"）
  while(sel.options.length>1)sel.remove(1);
  [...new Set(allData.map(r=>r.branch).filter(Boolean))].sort().forEach(b=>{
    const o=document.createElement('option');o.value=b;o.textContent=b;sel.appendChild(o);
  });
}

function renderTable(){
  const nameQ=document.getElementById('filter-name').value.trim();
  const branchQ=document.getElementById('filter-branch').value;
  const decQ=document.getElementById('filter-decision').value;
  const statusQ=document.getElementById('filter-status').value;
  let filtered=allData.filter(r=>{
    if(nameQ&&!(r.candidate_name||'').includes(nameQ))return false;
    if(branchQ&&r.branch!==branchQ)return false;
    if(decQ&&r.final_decision!==decQ)return false;
    if(statusQ&&r.doc_status!==statusQ)return false;
    return true;
  });
  document.getElementById('stat-total').textContent=filtered.length;
  document.getElementById('stat-pass').textContent=filtered.filter(r=>r.final_decision==='pass').length;
  document.getElementById('stat-fail').textContent=filtered.filter(r=>r.final_decision==='fail').length;
  const scores=filtered.map(r=>parseFloat(r.grand_total)).filter(n=>!isNaN(n));
  document.getElementById('stat-avg').textContent=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):'-';
  document.getElementById('table-count').textContent=`共 ${filtered.length} 筆`;
  const tbody=document.getElementById('admin-tbody');
  if(!filtered.length){
    tbody.innerHTML=`<tr><td colspan="12" style="text-align:center;padding:48px;color:var(--text3);font-size:13px;font-weight:700;">目前無符合條件的資料</td></tr>`;
    return;
  }
  const sb2=s=>s==='draft'?'<span class="badge badge-draft">暫存中</span>':s==='completed'?'<span class="badge badge-complete">已完成</span>':'<span class="badge badge-pending">決策中</span>';
  const db=d=>d==='pass'?'<span class="badge badge-pass">錄取</span>':d==='fail'?'<span class="badge badge-fail">不錄取</span>':'-';
  // 每列左側顯示分校logo小圖示
  tbody.innerHTML=filtered.map(r=>{
    const logoSrc=getBranchLogo(r.branch);
    return`<tr>
      <td style="color:var(--text3);font-size:12px;">${r.interview_date||'-'}</td>
      <td class="candidate-name">${r.candidate_name||'-'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px;">
          <img src="${logoSrc}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0;" onerror="this.style.display='none'">
          <span style="color:var(--text2);font-weight:500;">${r.branch||'-'}</span>
        </div>
      </td>
      <td style="color:var(--text3);">${r.position||'-'}</td>
      <td style="color:var(--text3);font-size:12px;">${r.interviewer||'-'}</td>
      <td style="font-weight:700;color:#059669;">${r.s1_final??'-'}</td>
      <td style="font-weight:700;color:#D97706;">${r.s3_final??'-'}</td>
      <td style="font-weight:700;color:#4F46E5;">${r.s2_final??'-'}</td>
      <td class="total-score">${r.grand_total??'-'}</td>
      <td>${sb2(r.doc_status)}</td>
      <td>${db(r.final_decision)}</td>
      <td><div class="action-btns">
        <button class="btn-action btn-edit" onclick="editRecord('${r.doc_id}')">編輯</button>
        <button class="btn-action btn-delete" onclick="deleteRecord('${r.doc_id}','${(r.candidate_name||'').replace(/'/g,"\\'")}')">刪除</button>
      </div></td>
    </tr>`;
  }).join('');
}

function editRecord(docId){
  const r=allData.find(x=>x.doc_id===docId);
  if(!r)return;
  sessionStorage.setItem('edit_state',JSON.stringify(r.state_json||r));
  window.location.href='index.html?emp='+currentUser.id+'&edit='+docId;
}

async function deleteRecord(docId,name){
  if(!confirm(`確定要刪除「${name}」的面試資料嗎？\n\n此操作無法復原。`))return;
  const{error}=await sb.from('interviews').delete().eq('doc_id',docId);
  if(error){alert('刪除失敗：'+error.message);return;}
  allData=allData.filter(r=>r.doc_id!==docId);
  showToast(`已刪除 ${name} 的資料`);
  renderTable();
}

function goFront(){window.location.href='index.html?emp='+currentUser.id;}

function adminLogout(){
  currentUser=null;allData=[];
  document.getElementById('page-admin').classList.remove('active');
  document.getElementById('page-login').classList.add('active');
  document.getElementById('login-pwd').value='';
  // 重置 Logo 為總部
  const defaultLogo='00逗點教室_各分校校徽_頭貼_總部.png';
  document.getElementById('login-logo-img').src=defaultLogo;
}

function showToast(msg){
  const t=document.getElementById('toast');
  if(t){t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
}
</script>
</body>
</html>
