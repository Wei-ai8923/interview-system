<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逗點教室｜面試後台管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--blue:#1D6FD8;--blue-dark:#1558B0;--blue-light:#EBF3FF;--bg:#F4F7FB;--white:#FFFFFF;--border:#DDE4EF;--border2:#C8D6EE;--text:#1A2338;--text2:#4B5C7A;--text3:#8898B4;--green:#059669;--red:#DC2626;--amber:#D97706;--shadow:0 1px 3px rgba(29,111,216,.07);--shadow-md:0 4px 16px rgba(29,111,216,.12);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.page{display:none!important;}.page.active{display:block!important;}#page-login.active{display:flex!important;}
#page-login{min-height:100vh;background:linear-gradient(135deg,#EBF3FF 0%,#F4F7FB 50%,#E8F0FE 100%);align-items:center;justify-content:center;}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(29,111,216,.12);}
.login-logo{text-align:center;margin-bottom:24px;}.login-logo img{height:80px;width:80px;object-fit:cover;border-radius:50%;display:block;margin:0 auto;}
.login-title{font-size:22px;font-weight:900;color:var(--text);text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:.05em;}
.form-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:3px;padding:10px 13px;font-size:14px;font-weight:500;color:var(--text);outline:none;transition:border-color .2s;font-family:'Noto Sans TC',sans-serif;}
.form-input:focus{border-color:var(--blue);background:var(--white);}
.form-input::placeholder{color:var(--text3);}
.btn-login{width:100%;background:var(--blue);color:white;border:none;border-radius:3px;padding:12px;font-size:15px;font-weight:900;cursor:pointer;transition:background .2s;font-family:'Noto Sans TC',sans-serif;}
.btn-login:hover{background:var(--blue-dark);}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;}

/* HEADER */
.admin-header{background:var(--white);border-bottom:2px solid var(--blue);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(29,111,216,.08);}
.header-inner{max-width:1600px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo-img{height:34px;width:34px;object-fit:cover;border-radius:50%;}
.header-title{font-size:15px;font-weight:900;color:var(--text);}
.header-sub{font-size:11px;color:var(--text3);}
.header-nav{display:flex;gap:8px;align-items:center;}
.nav-btn{padding:5px 14px;border-radius:2px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;border:1.5px solid var(--border2);background:transparent;color:var(--text2);}
.nav-btn:hover{border-color:var(--blue);color:var(--blue);}
.nav-btn-ghost{background:transparent;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.nav-btn-ghost:hover{color:var(--text);}

/* MAIN - 移除 overflow hidden，讓頁面整體捲動 */
.admin-main{max-width:1600px;margin:0 auto;padding:16px 24px 40px;}

/* 統計列 - 改為一行緊湊版 */
.stats-row{display:flex;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-top:3px solid var(--blue);flex:1;padding:10px 16px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;}
.stat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.stat-value{font-size:24px;font-weight:900;}

/* 篩選列緊湊版 */
.filter-bar{background:var(--white);border:1px solid var(--border);padding:10px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;box-shadow:var(--shadow);}
.filter-group label{display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.filter-input{background:var(--bg);border:1.5px solid var(--border);border-radius:2px;padding:5px 9px;font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans TC',sans-serif;transition:border-color .2s;}
.filter-input:focus{border-color:var(--blue);}

/* TABLE - 不用內部卷軸，整頁捲動 */
.table-wrap{background:var(--white);border:1px solid var(--border);box-shadow:var(--shadow);}
.table-header{background:#F0F4FA;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--border);}
.table-header-title{font-size:13px;font-weight:700;color:var(--text);}
.table-count{font-size:11px;color:var(--text3);}
/* 這裡不設 overflow，讓 table 自然撐開頁面 */
.tbl-wrap{overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;min-width:1100px;}
.tbl th{background:#F0F4FA;padding:9px 12px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);letter-spacing:.03em;text-transform:uppercase;white-space:nowrap;}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(221,228,239,.5);font-size:13px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--blue-light);}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-draft{background:#F1F5F9;color:#64748B;border:1px solid #E2E8F0;}
.badge-complete{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;}
.badge-pass{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;}
.badge-fail{background:#FEF2F2;color:#7F1D1D;border:1px solid #FECACA;}
.badge-pending{background:#FFFBEB;color:#78350F;border:1px solid #FDE68A;}
.prog-none{background:#F1F5F9;color:#64748B;border:1px solid #CBD5E1;}
.prog-pre{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A;}
.prog-scored{background:#EFF6FF;color:#1558B0;border:1px solid #BFDBFE;}
.prog-done{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;}

.candidate-name{font-weight:900;color:var(--blue);}

/* 總分 hover 浮窗 - 向下展開不遮擋 */
.total-score-cell{position:relative;}
.total-score-val{font-weight:900;font-size:15px;color:var(--blue);border-bottom:1px dashed var(--blue);cursor:pointer;white-space:nowrap;}
.score-popup{
  display:none;position:absolute;
  top:calc(100% + 6px);  /* 向下展開，在總分下方 */
  left:0;
  background:var(--white);border:1px solid var(--border2);
  padding:10px 14px;z-index:200;
  box-shadow:var(--shadow-md);min-width:170px;font-size:12px;
  border-top:2px solid var(--blue);
}
.total-score-cell:hover .score-popup{display:block;}
.score-popup-row{display:flex;justify-content:space-between;gap:16px;margin-bottom:5px;}
.score-popup-row:last-child{margin-bottom:0;border-top:1px solid var(--border);padding-top:5px;font-weight:700;}

/* 操作按鈕 */
.action-btns{display:flex;gap:5px;flex-wrap:nowrap;}
.btn-action{padding:4px 10px;border-radius:2px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;border:1.5px solid transparent;white-space:nowrap;}
.btn-edit{background:var(--bg);border-color:var(--border2);color:var(--text2);}
.btn-edit:hover{border-color:var(--blue);color:var(--blue);}
.btn-print{background:#F0FDF4;border-color:#A7F3D0;color:#065F46;}
.btn-print:hover{background:#DCFCE7;}
.btn-delete{background:#FEF2F2;border-color:#FECACA;color:#B91C1C;}
.btn-delete:hover{background:#FEE2E2;}

/* TOAST */
#toast{position:fixed;top:62px;right:16px;background:var(--white);border-left:3px solid var(--blue);border:1px solid var(--border);color:var(--blue);padding:10px 16px;font-size:13px;font-weight:700;transform:translateX(150%);transition:transform .3s;z-index:9999;box-shadow:var(--shadow-md);}
#toast.show{transform:translateX(0);}

/* ===== 列印 Modal ===== */
.print-modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,35,56,.5);z-index:9999;align-items:center;justify-content:center;}
.print-modal-overlay.show{display:flex;}
.print-modal{background:var(--white);border:1px solid var(--border);width:95%;max-width:900px;max-height:94vh;overflow-y:auto;box-shadow:0 20px 60px rgba(29,111,216,.2);}
.print-modal-header{background:#F0F4FA;padding:11px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:10;}
.print-modal-title{font-size:14px;font-weight:700;color:var(--text);}
.print-modal-actions{display:flex;gap:8px;align-items:center;}
.btn-do-print{padding:6px 16px;background:var(--blue);color:white;border:none;border-radius:2px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-do-print:hover{background:var(--blue-dark);}
.btn-close-print{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
.print-content{padding:24px 28px;}
.pc-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--blue);}
.pc-logo{width:52px;height:52px;border-radius:50%;object-fit:cover;}
.pc-org{font-size:12px;color:var(--text3);}
.pc-title{font-size:20px;font-weight:900;color:var(--text);}
.pc-section{margin-bottom:18px;}
.pc-section-title{font-size:12px;font-weight:700;color:var(--white);background:var(--blue);padding:5px 10px;letter-spacing:.05em;}
.pc-info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border);border-top:none;}
.pc-info-cell{padding:7px 10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.pc-info-cell:nth-child(4n){border-right:none;}
.pc-info-label{font-size:10px;color:var(--text3);font-weight:700;margin-bottom:2px;text-transform:uppercase;}
.pc-info-val{font-size:13px;font-weight:700;color:var(--text);}
.pc-table{width:100%;border-collapse:collapse;border:1px solid var(--border);border-top:none;}
.pc-table th{background:#F0F4FA;padding:6px 10px;font-size:11px;font-weight:700;color:var(--text2);border:1px solid var(--border);text-align:left;}
.pc-table td{padding:7px 10px;border:1px solid var(--border);font-size:12px;vertical-align:top;}
/* 外顯特質兩欄 */
.pc-s2-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-top:none;}
.pc-s2-row{display:flex;justify-content:space-between;padding:6px 10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);font-size:12px;}
.pc-s2-row:nth-child(2n){border-right:none;}
.pc-s2-score{font-weight:700;color:var(--blue);flex-shrink:0;margin-left:8px;}
.pc-total-box{background:var(--blue);color:white;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.pc-total-label{font-size:13px;font-weight:700;}
.pc-total-score{font-size:32px;font-weight:900;}
.pc-sub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--border);margin-bottom:14px;}
.pc-sub-cell{padding:8px;text-align:center;border-right:1px solid var(--border);}
.pc-sub-cell:last-child{border-right:none;}
.pc-sub-label{font-size:10px;color:var(--text3);font-weight:700;margin-bottom:2px;}
.pc-sub-score{font-size:18px;font-weight:900;}
.pc-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);}
.pc-result-box{padding:10px 12px;border-right:1px solid var(--border);}
.pc-result-box:last-child{border-right:none;}
.pc-result-box-full{padding:10px 12px;border-top:1px solid var(--border);grid-column:span 2;}
.pc-result-label{font-size:10px;color:var(--text3);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.pc-result-val{font-size:13px;font-weight:700;color:var(--text);}
.decision-pass{color:#059669;font-weight:900;}
.decision-fail{color:#DC2626;font-weight:900;}

/* 列印時的設定：移除頁首頁尾、確保全部印出 */
@media print{
  body *{visibility:hidden;}
  .print-content,.print-content *{visibility:visible;}
  .print-content{position:fixed;top:0;left:0;width:100%;padding:10mm;}
  .print-modal-header{display:none!important;}
  @page{
    size:A4 portrait;
    margin:10mm;
    /* 移除頁首頁尾的 URL */
  }
  /* 讓所有區塊可以跨頁 */
  .pc-section{break-inside:avoid;page-break-inside:avoid;}
  .pc-table{page-break-inside:auto;}
  .pc-table tr{page-break-inside:avoid;}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- 列印 Modal -->
<div id="print-modal" class="print-modal-overlay">
  <div class="print-modal">
    <div class="print-modal-header">
      <span class="print-modal-title">逗點教室｜面試評分表預覽</span>
      <div class="print-modal-actions">
        <button class="btn-do-print" onclick="window.print()">🖨 列印 / 下載 PDF</button>
        <button class="btn-close-print" onclick="closePrintModal()">✕</button>
      </div>
    </div>
    <div class="print-content" id="print-content"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="page-login" class="page active">
  <div class="login-card">
    <div class="login-logo"><img id="login-logo-img" src="00逗點教室_各分校校徽_頭貼_總部.png" alt="逗點教室"></div>
    <div class="login-title">面試後台管理</div>
    <div class="login-sub">逗點教室面試資料後台</div>
    <div class="form-group">
      <label class="form-label">員工編號</label>
      <input type="text" id="login-emp" class="form-input" placeholder="例：F00035" style="text-transform:uppercase;" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('login-pwd').focus()">
    </div>
    <div class="form-group">
      <label class="form-label">登入密碼</label>
      <input type="password" id="login-pwd" class="form-input" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')adminLogin()">
    </div>
    <button class="btn-login" id="btn-login-main" onclick="adminLogin()">進 入 後 台</button>
    <div class="login-hint">測試密碼：0000</div>
  </div>
</div>

<!-- ADMIN -->
<div id="page-admin" class="page">
  <header class="admin-header">
    <div class="header-inner">
      <div class="header-left">
        <img id="header-logo-img" src="00逗點教室_各分校校徽_頭貼_總部.png" class="header-logo-img" alt="">
        <div><div class="header-title">逗點教室｜面試後台管理</div><div class="header-sub" id="admin-subtitle"></div></div>
      </div>
      <div class="header-nav">
        <button class="nav-btn" onclick="goFront()">前台評分</button>
        <button class="nav-btn-ghost" onclick="adminLogout()">登出</button>
      </div>
    </div>
  </header>

  <div class="admin-main">
    <!-- 統計列 - 緊湊一行 -->
    <div class="stats-row">
      <div class="stat-card">
        <div><div class="stat-label">總面試筆數</div><div class="stat-value" id="stat-total" style="color:var(--blue);">0</div></div>
      </div>
      <div class="stat-card" style="border-top-color:#059669;">
        <div><div class="stat-label">錄取人數</div><div class="stat-value" id="stat-pass" style="color:#059669;">0</div></div>
      </div>
      <div class="stat-card" style="border-top-color:#DC2626;">
        <div><div class="stat-label">不錄取人數</div><div class="stat-value" id="stat-fail" style="color:#DC2626;">0</div></div>
      </div>
      <div class="stat-card" style="border-top-color:#D97706;">
        <div><div class="stat-label">平均總分</div><div class="stat-value" id="stat-avg" style="color:#D97706;">-</div></div>
      </div>
    </div>

    <!-- 篩選列 -->
    <div class="filter-bar">
      <div class="filter-group"><label>搜尋姓名</label><input type="text" id="filter-name" class="filter-input" placeholder="應徵者姓名" oninput="renderTable()" style="width:120px;"></div>
      <div class="filter-group" id="branch-filter-wrap"><label>篩選單位</label><select id="filter-branch" class="filter-input" onchange="renderTable()"><option value="">全部單位</option></select></div>
      <div class="filter-group"><label>篩選結果</label><select id="filter-decision" class="filter-input" onchange="renderTable()"><option value="">全部結果</option><option value="pass">錄取</option><option value="fail">不錄取</option></select></div>
      <div class="filter-group"><label>篩選狀態</label><select id="filter-status" class="filter-input" onchange="renderTable()"><option value="">全部狀態</option><option value="draft">暫存中</option><option value="completed">已完成</option></select></div>
      <div class="filter-group"><label>填寫進度</label><select id="filter-progress" class="filter-input" onchange="renderTable()"><option value="">全部進度</option><option value="none">未完成</option><option value="pre">面試前準備完成</option><option value="scored">面試評分完成</option><option value="done">已送出結果</option></select></div>
    </div>

    <!-- 資料表格 - 整頁捲動，不限高度 -->
    <div class="table-wrap">
      <div class="table-header"><span class="table-header-title">面試紀錄</span><span class="table-count" id="table-count"></span></div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th>面試日期</th><th>應徵者</th><th>分校/單位</th><th>職位</th><th>面試官</th>
              <th>總分</th><th>填寫進度</th><th>狀態</th><th>結果</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="admin-tbody">
            <tr><td colspan="10" style="text-align:center;padding:48px;color:var(--text3);font-size:13px;font-weight:700;">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>

const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzbHpoaWp3ZmJoZ3JvcGJtcWFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTg0NjksImV4cCI6MjA5MTI5NDQ2OX0.UUm9ShB9vd1PSGxLlW5kOwI5rzle1O2WYKmZcjE9Ksc';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const BRANCH_LOGO={'青埔翱翔校':'翱翔.png','青埔升大校':'升大.png','青園展翅校':'展翅.png','大園晨光校':'晨光.png','內壢森耀校':'內壢森耀校.png','竹北知行校':'竹北知行校.png','文化極光校':'極光.png','快樂騰雲校':'00逗點教室_各分校校徽_頭貼_總部.png','大園參天校':'參天.png','園中方舟校':'方舟.png','青埔旭日校':'旭日.png','中壢心夢想校':'心夢想.png'};
function getBranchLogo(d){return BRANCH_LOGO[d]||'00逗點教室_各分校校徽_頭貼_總部.png';}
const EMP_DB={"F00001":{name:"徐暘智",dept:"逗點集團",role:"ADMIN"},"F00003":{name:"劉芸諺",dept:"行政溝通處",role:"MGR"},"F00004":{name:"黃乙凡",dept:"國高中營運處",role:"SENIOR_HS"},"F00005":{name:"黃倪睨",dept:"國小營運處",role:"SENIOR_ES"},"F00007":{name:"黃偉婷",dept:"青園展翅校",role:"MGR"},"F00008":{name:"游立銘",dept:"中壢心夢想校",role:"MGR"},"F00009":{name:"林思誼",dept:"園中方舟校",role:"MGR"},"F00010":{name:"李安琇",dept:"青埔翱翔校",role:"MGR"},"F00012":{name:"陳映竹",dept:"青埔旭日校",role:"MGR"},"F00016":{name:"古欣平",dept:"文化極光校",role:"MGR"},"F00022":{name:"鄒瑞紋",dept:"大園參天校",role:"MGR"},"F00029":{name:"王欣俞",dept:"竹北知行校",role:"MGR"},"F00031":{name:"許芳茹",dept:"大園晨光校",role:"MGR"},"F00035":{name:"魏詩珊",dept:"人力資源處",role:"HR"},"F00054":{name:"曾佳敏",dept:"人力資源處",role:"HR"},"F00059":{name:"應羽涵",dept:"國小英文管理科",role:"MGR"},"F00070":{name:"林依屏",dept:"青埔升大校",role:"MGR"},"F00081":{name:"廖依珊",dept:"產品研發處",role:"MGR"},"F00084":{name:"巫珮菱",dept:"內壢森耀校",role:"MGR"},"F00086":{name:"呂鈺嬋",dept:"國高中營運處",role:"MGR"},"F00092":{name:"蔡玉晴",dept:"快樂騰雲校",role:"MGR"}};
const HS_BRANCHES=["中壢心夢想校","園中方舟校","青埔旭日校","大園參天校","青埔升大校","國高中營運處"];
const ES_BRANCHES=["青園展翅校","青埔翱翔校","大園晨光校","內壢森耀校","竹北知行校","文化極光校","快樂騰雲校","國小營運處"];
const S1_DATA=[{id:'exp',title:"工作經歷",qs:["最能代表其專業能力及理想的經歷？"]},{id:'mot',title:"動機與價值",qs:["與我們最契合的價值觀？","影響個人去留的主因？"]},{id:'sty',title:"工作風格",qs:["最滿意或欣賞的工作環境、管理制度？","感到挫敗或壓力最大的案例？當時如何應對？"]},{id:'sal',title:"薪資與期待",qs:["期望月薪/年薪及初期最低薪資？","最感興趣的工作任務與職涯關聯？","想了解或擔心的部分？"]},{id:'bon',title:"特別加分題",qs:["補充說明"]}];
const S2_QUESTIONS=["儀容穿著","禮貌應對","表達流暢","自信穩健","誠懇親和","對分校了解","對職務認知","企圖心展現","配合度","邏輯思考","臨場反應","學習意願","情緒穩定","抗壓性","團隊合作","經歷相關","專業知識"];
const S3_CORE_NAMES=["品質成果導向","顧客導向","問題解決","團隊合作","溝通協調","創新能力"];
const S3_MGMT_NAMES=["策略性思考","人才發展","文化落實"];
let currentUser=null,allData=[];

function detectProgress(r){
  const s=r.state_json||r;
  if((r.doc_status==='completed'||s.docStatus==='completed')&&(r.final_decision||s.finalDecision))return 'done';
  if(s.s1&&s.s2&&s.s3){
    const sum=arr=>arr.reduce((a,b)=>a+b,0);
    const s1Filled=Object.keys(s.s1).filter(k=>k!=='bonText').every(k=>{if(k==='bon')return true;return Array.isArray(s.s1[k])&&sum(s.s1[k])>0;});
    const s2Filled=Array.isArray(s.s2)&&sum(s.s2)>0;
    const s3CoreFilled=Array.isArray(s.s3.core)&&s.s3.core.every(v=>v>0);
    const s3MgmtFilled=Array.isArray(s.s3.mgmt)&&s.s3.mgmt.every(v=>v>0);
    if(s1Filled&&s2Filled&&s3CoreFilled&&s3MgmtFilled)return 'scored';
  }
  if(s.s1&&s.s3Texts){
    const sum=arr=>arr.reduce((a,b)=>a+b,0);
    const s1AllFilled=Object.keys(s.s1).filter(k=>k!=='bonText').every(k=>{if(k==='bon')return true;return Array.isArray(s.s1[k])&&sum(s.s1[k])>0;});
    const beiFilled=s.s3Texts.core&&s.s3Texts.mgmt&&s.s3Texts.core.every(t=>t&&t.bei&&t.bei.trim()!=='')&&s.s3Texts.mgmt.every(t=>t&&t.bei&&t.bei.trim()!=='');
    if(s1AllFilled&&beiFilled)return 'pre';
  }
  return 'none';
}

function progressBadge(prog){
  return{none:'<span class="badge prog-none">未完成</span>',pre:'<span class="badge prog-pre">面試前準備完成</span>',scored:'<span class="badge prog-scored">面試評分完成</span>',done:'<span class="badge prog-done">已送出結果</span>'}[prog]||'<span class="badge prog-none">未完成</span>';
}

window.onload=async()=>{
  const params=new URLSearchParams(window.location.search);
  const empId=params.get('emp');
  if(empId&&EMP_DB[empId]){currentUser={...EMP_DB[empId],id:empId};await loadAndShow();window.history.replaceState({},'',window.location.pathname);}
};

async function adminLogin(){
  const empId=document.getElementById('login-emp').value.trim().toUpperCase();
  const pwd=document.getElementById('login-pwd').value.trim();
  if(!empId)return alert('請輸入員工編號');
  if(pwd!=='0000')return alert('密碼錯誤（測試密碼：0000）');
  if(!EMP_DB[empId])return alert('查無此員工編號');
  currentUser={...EMP_DB[empId],id:empId};
  const btn=document.getElementById('btn-login-main');btn.textContent='登入中...';btn.disabled=true;
  await loadAndShow();
  btn.textContent='進 入 後 台';btn.disabled=false;
}

async function loadAndShow(){
  await loadData();
  const logoSrc=getBranchLogo(currentUser.dept);
  document.getElementById('login-logo-img').src=logoSrc;
  document.getElementById('header-logo-img').src=logoSrc;
  document.getElementById('page-login').classList.remove('active');
  document.getElementById('page-admin').classList.add('active');
  const roleLabel=['HR','ADMIN'].includes(currentUser.role)?'人資/管理員 — 全公司資料':currentUser.role==='SENIOR_HS'?'國高中營運處 — 國高中各校':currentUser.role==='SENIOR_ES'?'國小營運處 — 國小各校':`${currentUser.dept} — 本單位資料`;
  document.getElementById('admin-subtitle').textContent=`${currentUser.name}（${currentUser.dept}）| ${roleLabel}`;
  if(['HR','ADMIN','SENIOR_HS','SENIOR_ES'].includes(currentUser.role))populateBranchFilter();
  else document.getElementById('branch-filter-wrap').style.display='none';
  renderTable();
}

async function loadData(){
  let q=sb.from('interviews').select('*').order('created_at',{ascending:false});
  if(currentUser.role==='SENIOR_HS')q=q.in('branch',HS_BRANCHES);
  else if(currentUser.role==='SENIOR_ES')q=q.in('branch',ES_BRANCHES);
  else if(!['HR','ADMIN'].includes(currentUser.role))q=q.eq('branch',currentUser.dept);
  const{data,error}=await q;
  if(error){alert('載入失敗：'+error.message);return;}
  allData=data||[];
}

function populateBranchFilter(){
  const sel=document.getElementById('filter-branch');
  while(sel.options.length>1)sel.remove(1);
  [...new Set(allData.map(r=>r.branch).filter(Boolean))].sort().forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;sel.appendChild(o);});
}

function renderTable(){
  const nameQ=document.getElementById('filter-name').value.trim();
  const branchQ=document.getElementById('filter-branch').value;
  const decQ=document.getElementById('filter-decision').value;
  const statusQ=document.getElementById('filter-status').value;
  const progQ=document.getElementById('filter-progress').value;
  let filtered=allData.filter(r=>{
    if(nameQ&&!(r.candidate_name||'').includes(nameQ))return false;
    if(branchQ&&r.branch!==branchQ)return false;
    if(decQ&&r.final_decision!==decQ)return false;
    if(statusQ&&r.doc_status!==statusQ)return false;
    if(progQ&&detectProgress(r)!==progQ)return false;
    return true;
  });
  document.getElementById('stat-total').textContent=filtered.length;
  document.getElementById('stat-pass').textContent=filtered.filter(r=>r.final_decision==='pass').length;
  document.getElementById('stat-fail').textContent=filtered.filter(r=>r.final_decision==='fail').length;
  const scores=filtered.map(r=>parseFloat(r.grand_total)).filter(n=>!isNaN(n));
  document.getElementById('stat-avg').textContent=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):'-';
  document.getElementById('table-count').textContent=`共 ${filtered.length} 筆`;
  const tbody=document.getElementById('admin-tbody');
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="10" style="text-align:center;padding:48px;color:var(--text3);font-size:13px;font-weight:700;">目前無符合條件的資料</td></tr>`;return;}
  const sb2=s=>s==='draft'?'<span class="badge badge-draft">暫存中</span>':s==='completed'?'<span class="badge badge-complete">已完成</span>':'<span class="badge badge-pending">決策中</span>';
  const db=d=>d==='pass'?'<span class="badge badge-pass">錄取</span>':d==='fail'?'<span class="badge badge-fail">不錄取</span>':'-';
  tbody.innerHTML=filtered.map(r=>{
    const logoSrc=getBranchLogo(r.branch);
    const prog=detectProgress(r);
    const docId=(r.doc_id||'').replace(/'/g,"\\'");
    const name=(r.candidate_name||'').replace(/'/g,"\\'");
    return`<tr>
      <td style="color:var(--text3);font-size:12px;white-space:nowrap;">${r.interview_date||'-'}</td>
      <td class="candidate-name">${r.candidate_name||'-'}</td>
      <td><div style="display:flex;align-items:center;gap:6px;"><img src="${logoSrc}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0;" onerror="this.style.display='none'"><span style="color:var(--text2);font-weight:500;">${r.branch||'-'}</span></div></td>
      <td style="color:var(--text3);font-size:12px;">${r.position||'-'}</td>
      <td style="color:var(--text3);font-size:12px;">${r.interviewer||'-'}</td>
      <td class="total-score-cell">
        <span class="total-score-val">${r.grand_total??'-'}</span>
        <div class="score-popup">
          <div class="score-popup-row"><span style="color:#059669;">一、筆試</span><span style="font-weight:700;">${r.s1_final??'-'}</span></div>
          <div class="score-popup-row"><span style="color:#D97706;">二、職能</span><span style="font-weight:700;">${r.s3_final??'-'}</span></div>
          <div class="score-popup-row"><span style="color:#4F46E5;">三、外顯</span><span style="font-weight:700;">${r.s2_final??'-'}</span></div>
          <div class="score-popup-row"><span>總分</span><span style="color:var(--blue);">${r.grand_total??'-'}</span></div>
        </div>
      </td>
      <td>${progressBadge(prog)}</td>
      <td>${sb2(r.doc_status)}</td>
      <td>${db(r.final_decision)}</td>
      <td><div class="action-btns">
        <button class="btn-action btn-edit" onclick="editRecord('${docId}')">編輯</button>
        <button class="btn-action btn-print" onclick="printRecord('${docId}')">列印</button>
        <button class="btn-action btn-delete" onclick="deleteRecord('${docId}','${name}')">刪除</button>
      </div></td>
    </tr>`;
  }).join('');
}

function editRecord(docId){
  const r=allData.find(x=>x.doc_id===docId);
  if(!r)return;
  sessionStorage.setItem('edit_state',JSON.stringify(r));
  window.location.href='index.html?emp='+currentUser.id+'&edit='+encodeURIComponent(docId);
}

function printRecord(docId){
  const r=allData.find(x=>x.doc_id===docId);
  if(!r)return;
  const s=r.state_json||r;
  const logoSrc=getBranchLogo(r.branch);
  const decText=r.final_decision==='pass'?'<span class="decision-pass">✓ 錄取</span>':r.final_decision==='fail'?'<span class="decision-fail">✕ 不予錄取</span>':'尚未決定';
  let s1Rows='';
  if(s.s1){
    S1_DATA.forEach(g=>{
      if(g.id==='bon'){
        s1Rows+=`<tr><td style="font-weight:700;background:#F8FAFF;white-space:nowrap;">${g.title}</td><td colspan="2">${s.s1.bonText||'-'}</td><td style="text-align:center;font-weight:700;">${s.s1.bon?s.s1.bon[0]||'-':'-'}</td></tr>`;
      }else{
        g.qs.forEach((q,i)=>{s1Rows+=`<tr><td style="font-weight:700;background:#F8FAFF;white-space:nowrap;">${g.title}</td><td colspan="2">${q}</td><td style="text-align:center;font-weight:700;">${s.s1[g.id]?s.s1[g.id][i]||'-':'-'}</td></tr>`;});
      }
    });
  }
  // 外顯特質兩欄
  let s2Rows='';
  if(s.s2){
    // 左欄1-9，右欄10-17
    const leftItems=S2_QUESTIONS.slice(0,9);
    const rightItems=S2_QUESTIONS.slice(9);
    const maxLen=Math.max(leftItems.length,rightItems.length);
    for(let i=0;i<maxLen;i++){
      const lq=leftItems[i]?`<div class="pc-s2-row" style="border-right:1px solid var(--border);"><span>${i+1}. ${leftItems[i]}</span><span class="pc-s2-score">${s.s2[i]||'-'}</span></div>`:'<div class="pc-s2-row" style="border-right:1px solid var(--border);background:#fafafa;"></div>';
      const ri=i+9;const rq=rightItems[i]?`<div class="pc-s2-row"><span>${ri+1}. ${rightItems[i]}</span><span class="pc-s2-score">${s.s2[ri]||'-'}</span></div>`:'<div class="pc-s2-row"></div>';
      s2Rows+=lq+rq;
    }
  }
  let s3Rows='';
  if(s.s3&&s.s3Texts){
    S3_CORE_NAMES.forEach((name,i)=>{
      const t=s.s3Texts.core&&s.s3Texts.core[i]||{bei:'',c:'',a:'',r:''};
      s3Rows+=`<tr><td style="background:#EFF6FF;text-align:center;font-weight:700;font-size:11px;color:#1D6FD8;width:44px;">核心</td><td style="font-weight:700;text-align:center;width:76px;font-size:12px;">${name}</td><td style="font-size:11px;">${t.bei||'-'}</td><td style="font-size:11px;">${t.c||'-'}</td><td style="font-size:11px;">${t.a||'-'}</td><td style="font-size:11px;">${t.r||'-'}</td><td style="text-align:center;font-weight:700;">${s.s3.core[i]||'-'}</td></tr>`;
    });
    S3_MGMT_NAMES.forEach((name,i)=>{
      const t=s.s3Texts.mgmt&&s.s3Texts.mgmt[i]||{bei:'',c:'',a:'',r:''};
      s3Rows+=`<tr><td style="background:#F0FDF4;text-align:center;font-weight:700;font-size:11px;color:#059669;width:44px;">管理</td><td style="font-weight:700;text-align:center;width:76px;font-size:12px;">${name}</td><td style="font-size:11px;">${t.bei||'-'}</td><td style="font-size:11px;">${t.c||'-'}</td><td style="font-size:11px;">${t.a||'-'}</td><td style="font-size:11px;">${t.r||'-'}</td><td style="text-align:center;font-weight:700;">${s.s3.mgmt[i]||'-'}</td></tr>`;
    });
  }
  const html=`
    <div class="pc-header">
      <img src="${logoSrc}" class="pc-logo" onerror="this.style.display='none'">
      <div><div class="pc-org">逗點教室</div><div class="pc-title">面試評分表</div></div>
    </div>
    <div class="pc-section">
      <div class="pc-section-title">基本資訊</div>
      <div class="pc-info-grid">
        <div class="pc-info-cell"><div class="pc-info-label">應徵者</div><div class="pc-info-val">${r.candidate_name||'-'}</div></div>
        <div class="pc-info-cell"><div class="pc-info-label">分校/單位</div><div class="pc-info-val">${r.branch||'-'}</div></div>
        <div class="pc-info-cell"><div class="pc-info-label">應徵職位</div><div class="pc-info-val">${r.position||'-'}</div></div>
        <div class="pc-info-cell"><div class="pc-info-label">面試官</div><div class="pc-info-val">${r.interviewer||'-'}</div></div>
        <div class="pc-info-cell"><div class="pc-info-label">面試日期</div><div class="pc-info-val">${r.interview_date||'-'}</div></div>
        <div class="pc-info-cell"><div class="pc-info-label">開始時間</div><div class="pc-info-val">${r.interview_time||'-'}</div></div>
        <div class="pc-info-cell" style="grid-column:span 2;"><div class="pc-info-label">系統建議</div><div class="pc-info-val" style="color:var(--blue);">${r.ideal_status||'-'}</div></div>
      </div>
    </div>
    <div class="pc-section">
      <div class="pc-section-title">一、筆試和綜合面談（30%）</div>
      <table class="pc-table"><thead><tr><th style="width:80px;">類別</th><th colspan="2">題目</th><th style="width:50px;text-align:center;">分數</th></tr></thead><tbody>${s1Rows}</tbody></table>
    </div>
    <div class="pc-section">
      <div class="pc-section-title">二、職能面試（60%）</div>
      <table class="pc-table"><thead><tr><th>維度</th><th>職能項目</th><th>BEI 問題描述</th><th>狀況 C</th><th>行動 A</th><th>結果 R</th><th style="width:44px;text-align:center;">分數</th></tr></thead><tbody>${s3Rows}</tbody></table>
    </div>
    <div class="pc-section">
      <div class="pc-section-title">三、外顯特質（10%）</div>
      <div class="pc-s2-grid">${s2Rows}</div>
    </div>
    <div class="pc-section">
      <div class="pc-total-box"><div class="pc-total-label">系統最終總得分</div><div class="pc-total-score">${r.grand_total||'-'}</div></div>
      <div class="pc-sub-grid">
        <div class="pc-sub-cell"><div class="pc-sub-label">一、筆試</div><div class="pc-sub-score" style="color:#059669;">${r.s1_final||'-'}</div></div>
        <div class="pc-sub-cell"><div class="pc-sub-label">二、職能</div><div class="pc-sub-score" style="color:#D97706;">${r.s3_final||'-'}</div></div>
        <div class="pc-sub-cell"><div class="pc-sub-label">三、外顯</div><div class="pc-sub-score" style="color:#4F46E5;">${r.s2_final||'-'}</div></div>
      </div>
      <div class="pc-result-grid">
        <div class="pc-result-box"><div class="pc-result-label">加分項目</div><div class="pc-result-val">${(s.s1&&s.s1.bonText)||'-'}</div></div>
        <div class="pc-result-box"><div class="pc-result-label">最終錄取結果</div><div class="pc-result-val">${decText}</div></div>
        <div class="pc-result-box-full"><div class="pc-result-label">面試官備註</div><div class="pc-result-val">${r.interview_note||'-'}</div></div>
      </div>
    </div>`;
  document.getElementById('print-content').innerHTML=html;
  document.getElementById('print-modal').classList.add('show');
}

function closePrintModal(){document.getElementById('print-modal').classList.remove('show');}

async function deleteRecord(docId,name){
  if(!confirm(`確定要刪除「${name}」的面試資料嗎？\n\n此操作無法復原。`))return;
  const{error}=await sb.from('interviews').delete().eq('doc_id',docId);
  if(error){alert('刪除失敗：'+error.message);return;}
  allData=allData.filter(r=>r.doc_id!==docId);
  showToast(`已刪除 ${name} 的資料`);
  renderTable();
}

function goFront(){window.location.href='index.html?emp='+currentUser.id;}

function adminLogout(){
  currentUser=null;allData=[];
  document.getElementById('page-admin').classList.remove('active');
  document.getElementById('page-login').classList.add('active');
  document.getElementById('login-pwd').value='';
  document.getElementById('login-logo-img').src='00逗點教室_各分校校徽_頭貼_總部.png';
}

function showToast(msg){const t=document.getElementById('toast');if(t){t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}}
</script>
