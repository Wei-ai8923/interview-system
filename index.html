<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面試評分系統 - Pro 旗艦版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* 動態主題顏色變數 */
        :root {
            --th-header: #1e3a8a; --th-header-border: #3b82f6; --th-header-dark: #172554;
            --th-light-bg: #eff6ff; --th-light-border: #bfdbfe; --th-text: #1d4ed8;
            --th-btn: #2563eb; --th-btn-hover: #1d4ed8; --th-score: #60a5fa;
        }
        body[data-theme="green"] {
            --th-header: #14532d; --th-header-border: #22c55e; --th-header-dark: #052e16;
            --th-light-bg: #f0fdf4; --th-light-border: #bbf7d0; --th-text: #15803d;
            --th-btn: #16a34a; --th-btn-hover: #15803d; --th-score: #4ade80;
        }
        body[data-theme="yellow"] {
            --th-header: #d97706; --th-header-border: #fcd34d; --th-header-dark: #b45309;
            --th-light-bg: #fffbeb; --th-light-border: #fde68a; --th-text: #b45309;
            --th-btn: #f59e0b; --th-btn-hover: #d97706; --th-score: #fbbf24;
        }
        body[data-theme="black"] {
            --th-header: #0f172a; --th-header-border: #64748b; --th-header-dark: #020617;
            --th-light-bg: #f8fafc; --th-light-border: #e2e8f0; --th-text: #334155;
            --th-btn: #1e293b; --th-btn-hover: #0f172a; --th-score: #94a3b8;
        }
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .th-header { background-color: var(--th-header); border-bottom: 3px solid var(--th-header-border); transition: background-color 0.3s ease; }
        .th-header-box { background-color: var(--th-header-dark); border: 1px solid var(--th-header-border); }
        .th-light-box { background-color: var(--th-light-bg); border: 1px solid var(--th-light-border); }
        .th-text { color: var(--th-text); }
        .th-btn-primary { background-color: var(--th-btn); color: white; transition: all 0.3s ease; }
        .th-btn-primary:hover { background-color: var(--th-btn-hover); transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        /* 頁面切換邏輯與登入置中 */
        .page-view { display: none !important; }
        .page-view.active { display: block !important; animation: fadeIn 0.3s ease; }
        #view-login.active { display: flex !important; } 
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 評分按鈕 */
        .score-btn { transition: all 0.15s ease-in-out; cursor: pointer; border: 1px solid #cbd5e1; background-color: white; position: relative; }
        .score-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .score-btn.active { transform: scale(1.05); border-width: 2px; }
        .score-btn.active[data-val="1"] { background-color: #ef4444; color: white; border-color: #b91c1c; }
        .score-btn.active[data-val="2"] { background-color: #f97316; color: white; border-color: #c2410c; }
        .score-btn.active[data-val="3"] { background-color: #eab308; color: white; border-color: #a16207; }
        .score-btn.active[data-val="4"] { background-color: #84cc16; color: white; border-color: #4d7c0f; }
        .score-btn.active[data-val="5"] { background-color: #22c55e; color: white; border-color: #15803d; }
        
        /* 懸停提示 (Tooltip) */
        .tooltip-text { visibility: hidden; opacity: 0; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background-color: #1e293b; color: white; text-align: center; padding: 6px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 50; pointer-events: none; transition: opacity 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .score-btn:hover .tooltip-text { visibility: visible; opacity: 1; }
        
        .input-cell { @apply w-full border border-slate-300 rounded p-1.5 text-sm focus:ring-2 focus:ring-blue-400 outline-none resize-none transition-all; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .decision-btn { transition: all 0.2s; border: 2px solid transparent; }
        .decision-btn.active-pass { background-color: #ecfdf5; border-color: #10b981; color: #047857; transform: scale(1.02); }
        .decision-btn.active-fail { background-color: #fef2f2; border-color: #ef4444; color: #b91c1c; transform: scale(1.02); }

        #toast { position: fixed; bottom: 80px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transform: translateX(150%); transition: transform 0.3s ease; z-index: 99999; }
        #toast.show { transform: translateX(0); }

        /* Modals */
        .modal-overlay { display: none; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); z-index: 99999; }
        .modal-overlay.show { display: flex; }

        @keyframes small-pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-small-pop { animation: small-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 列印模式 (A4橫式) */
        .report-label { display: none; } 
        body.report-mode { background-color: white; padding-bottom: 0 !important; }
        body.report-mode .hide-in-report { display: none !important; }
        body.report-mode input, body.report-mode textarea, body.report-mode select { border: none !important; background: transparent !important; appearance: none; -webkit-appearance: none; pointer-events: none; resize: none; padding: 0 !important; color: #000 !important; font-weight: bold; }
        body.report-mode .shadow-sm, body.report-mode .shadow-md, body.report-mode .shadow-lg, body.report-mode .shadow-xl { box-shadow: none !important; }
        
        body.report-mode .score-btn:not(.active) { display: none !important; }
        body.report-mode .score-btn.active { transform: none !important; cursor: default; width: auto !important; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin: 0; box-shadow: none !important; border: 1px solid #ccc; }
        body.report-mode .s1-s2-btn .btn-num { display: none !important; }
        body.report-mode .s1-s2-btn .report-label { display: inline-block !important; margin-left: 2px; }
        body.report-mode .decision-btn:not([class*="active-"]) { display: none !important; }
        body.report-mode .decision-btn { padding: 4px 8px !important; pointer-events: none; font-size: 12px; border: 1px solid #ccc; }
        
        @media print {
            .no-print { display: none !important; }
            body { font-size: 9px !important; line-height: 1.1 !important; color: #000; -webkit-print-color-adjust: exact; print-color-adjust: exact;}
            @page { size: A4 landscape; margin: 10mm; } 
            main { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            section { border: 1px solid #94a3b8 !important; margin-bottom: 3px !important; border-radius: 4px !important; break-inside: avoid; }
            table { width: 100% !important; table-layout: fixed !important; }
            table th, table td { padding: 1px 2px !important; border: 1px solid #cbd5e1 !important; font-size: 8px !important; word-wrap: break-word !important;}
            .overflow-x-auto { overflow: visible !important; }
            .bg-slate-900, .bg-slate-800, .bg-emerald-50, .bg-indigo-50, .bg-orange-50 { background-color: #f1f5f9 !important; color: #000 !important; border: none !important; }
            .text-white, .text-slate-200, .text-slate-400 { color: #0f172a !important; }
            .text-blue-400, .text-emerald-400, .text-orange-400, .text-amber-300, .text-red-400, .text-red-500 { color: #000 !important; font-weight: 900 !important; }
            textarea { min-height: unset !important; height: auto !important; border-bottom: 1px dashed #ccc !important; font-size: 10px !important; }
        }
    </style>
</head>
<body data-theme="blue">
    <!-- 系統通知 -->
    <div id="toast">✅ 操作成功！</div>

    <!-- 檢核表 (Checklist) Modal -->
    <div id="checklist-modal" class="fixed inset-0 items-center justify-center modal-overlay no-print z-[99999]">
        <div class="bg-white w-11/12 max-w-2xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-small-pop">
            <div class="bg-slate-800 p-4 flex justify-between items-center">
                <h2 class="text-white font-bold text-lg flex items-center gap-2">📝 【主任/主管面試規範 Checklist】</h2>
                <button onclick="window.toggleChecklist()" class="text-slate-400 hover:text-white text-xl leading-none">✕</button>
            </div>
            <div class="p-6 overflow-auto bg-slate-50 space-y-6 flex-1">
                <p class="text-sm text-slate-600 leading-relaxed font-medium">
                    各位主任好，為因應從「逗點集團」出發的面試能夠標準且一致化，我們需拿出相同的品質來對待所有面試者，再請您確認以下面試準備清單，確保面試能夠有好的開始與結尾，感謝您
                </p>

                <!-- 一、面試前 -->
                <div>
                    <h3 class="font-bold text-base text-slate-800 mb-2 border-l-4 border-blue-500 pl-2">一、面試前（準備階段）</h3>
                    <div class="space-y-2 pl-2">
                        <label class="flex items-start gap-2 cursor-pointer text-sm text-slate-700 hover:bg-slate-200 p-1 rounded transition-colors"><input type="checkbox" class="chk-item mt-1" onchange="window.syncState()"> <span>已完整閱讀面試者履歷（工作經歷、離職原因、自我介紹）</span></label>
                        <label class="flex items-start gap-2 cursor-pointer text-sm text-slate-700 hover:bg-slate-200 p-1 rounded transition-colors"><input type="checkbox" class="chk-item mt-1" onchange="window.syncState()"> <span>已瀏覽及評分面試者填寫之應徵表單（筆試資料）</span></label>
