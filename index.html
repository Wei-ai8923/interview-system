<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>逗點教室｜問題管理平台</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f5f7;
      --w: #fff;
      --bg3: #f0f2f5;
      --bg4: #e4e6ea;
      --bd: rgba(0, 0, 0, .08);
      --bd2: rgba(0, 0, 0, .18);
      --tx: #1a1a2e;
      --tx2: #555570;
      --tx3: #999ab0;
      --gn: #00b894;
      --rd: #e74c3c;
      --og: #e67e22;
      --pu: #8e44ad;
      --bl: #0361bf;
      --es: #e5ba07;
      --r: 12px;
      --rs: 8px;
      --sh: 0 2px 12px rgba(0, 0, 0, .07);
      --shl: 0 8px 32px rgba(0, 0, 0, .13);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
    }

    .hd {
      display: flex;
      align-items: center;
      padding: 0 32px;
      height: 58px;
      background: var(--w);
      border-bottom: 2px solid var(--bd);
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: var(--sh);
    }

    .hd-l {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hd-l img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 8px;
    }

    .hd-n {
      font-size: 15px;
      font-weight: 900;
    }

    .hd-s {
      font-size: 11px;
      color: var(--tx3);
    }

    .nav {
      display: flex;
      padding: 0 32px;
      background: var(--w);
      border-bottom: 3px solid #e8eaed;
      position: sticky;
      top: 58px;
      z-index: 199;
    }

    .nb {
      padding: 12px 20px;
      border: none;
      border-bottom: 3px solid transparent;
      background: none;
      color: var(--tx3);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: -3px;
      transition: all .15s;
    }

    .nb:hover {
      color: var(--tx2);
      background: var(--bg3);
    }

    .nb.on {
      color: var(--bl);
      font-weight: 900;
      border-bottom-color: var(--bl);
      background: rgba(3, 97, 191, .04);
    }

    .main {
      padding: 24px 32px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .pg {
      display: none;
    }

    .pg.on {
      display: block;
    }

    .btn {
      padding: 8px 16px;
      border-radius: var(--rs);
      border: 1.5px solid var(--bd2);
      background: transparent;
      color: var(--tx2);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: all .12s;
    }

    .btn:hover {
      background: var(--bg3);
    }

    .btn-bl {
      background: var(--bl);
      border-color: var(--bl);
      color: #fff;
      font-weight: 700;
    }

    .btn-bl:hover {
      background: #0250a8;
    }

    .btn-gn {
      background: var(--gn);
      border-color: var(--gn);
      color: #fff;
      font-weight: 700;
    }

    .btn-gn:hover {
      background: #009d7f;
    }

    .btn-rd {
      background: var(--rd);
      border-color: var(--rd);
      color: #fff;
      font-weight: 700;
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
    }

    .btn-xs {
      padding: 3px 8px;
      font-size: 11px;
    }

    .flbl {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--tx2);
      margin-bottom: 7px;
    }

    .fg {
      margin-bottom: 16px;
    }

    .fi,
    .fta,
    .fsel {
      width: 100%;
      background: var(--bg3);
      border: 1.5px solid var(--bd);
      border-radius: var(--rs);
      padding: 10px 13px;
      color: var(--tx);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all .12s;
    }

    .fi:focus,
    .fta:focus,
    .fsel:focus {
      border-color: var(--bl);
      background: var(--w);
      box-shadow: 0 0 0 3px rgba(3, 97, 191, .08);
    }

    .fta {
      resize: vertical;
      min-height: 90px;
      line-height: 1.6;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--bd2);
      background: var(--bg3);
      color: var(--tx2);
      transition: all .12s;
      user-select: none;
    }

    .tag-chip.sel {
      color: #fff;
    }

    .itag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }

    .itag.tc-教學 {
      background: rgba(3, 97, 191, .12);
      color: #0361bf;
    }

    .itag.tc-導師 {
      background: rgba(142, 68, 173, .12);
      color: #8e44ad;
    }

    .itag.tc-招生 {
      background: rgba(230, 126, 34, .12);
      color: #c0392b;
    }

    .itag.tc-系統 {
      background: rgba(231, 76, 60, .12);
      color: #e74c3c;
    }

    .itag.tc-家長 {
      background: rgba(0, 184, 148, .12);
      color: #00b894;
    }

    .itag.tc-孩子 {
      background: rgba(243, 156, 18, .12);
      color: #d68910;
    }

    .itag.tc-其他 {
      background: rgba(127, 140, 141, .12);
      color: #7f8c8d;
    }

    .score-btns {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      width: 100%;
    }

    .score-btn {
      width: 100%;
      height: 38px;
      border-radius: 8px;
      border: 1.5px solid var(--bd2);
      background: var(--bg3);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .12s;
      font-family: inherit;
      color: var(--tx2);
    }

    .score-btn:hover {
      border-color: var(--bl);
      color: var(--bl);
    }

    .score-btn.sel {
      background: var(--bl);
      border-color: var(--bl);
      color: #fff;
    }

    .score-btn.none-sel {
      background: var(--bg3);
      border-color: var(--bd2);
      color: var(--tx2);
    }

    /* REPORT OVERVIEW */
    .branch-overview {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .branch-group {
      background: var(--w);
      border: 1.5px solid var(--bd);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--sh);
    }

    .branch-group-hd {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-bottom: 1.5px solid var(--bg3);
    }

    .branch-group-label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .bgl-hsjh {
      background: rgba(3, 97, 191, .1);
      color: var(--bl);
    }

    .bgl-es {
      background: rgba(229, 186, 7, .18);
      color: #7a5c00;
    }

    .branch-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 18px;
    }

    .branch-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 10px;
      background: var(--bg3);
      border: 1.5px solid var(--bd);
      border-radius: var(--r);
      cursor: pointer;
      transition: all .18s cubic-bezier(.34, 1.56, .64, 1);
      min-width: 88px;
      position: relative;
    }

    .branch-card:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: var(--shl);
      border-color: var(--bl);
    }

    .branch-card img,
    .branch-card .ph {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .12);
    }

    .branch-card .ph {
      background: #e5ba07;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: #7a5c00;
    }

    .branch-card-name {
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }

    .branch-card-cnt {
      font-size: 10px;
      color: var(--tx3);
    }

    .b-dot {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--bg4);
    }

    .b-dot.red {
      background: var(--rd);
      box-shadow: 0 0 4px rgba(231, 76, 60, .5);
    }

    .b-dot.grn {
      background: var(--gn);
    }

    /* ISSUE MINI LIST */
    .issue-mini-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 260px;
      overflow-y: auto;
    }

    .issue-mini {
      background: var(--bg3);
      border-radius: var(--rs);
      padding: 9px 12px;
      cursor: pointer;
      transition: all .12s;
      border: 1px solid transparent;
    }

    .issue-mini:hover {
      border-color: var(--bl);
      background: var(--w);
    }

    .issue-mini-tags {
      display: flex;
      gap: 4px;
      margin-bottom: 3px;
      flex-wrap: wrap;
    }

    .issue-mini-content {
      font-size: 13px;
      font-weight: 600;
      color: var(--tx);
      line-height: 1.4;
    }

    .issue-mini-meta {
      font-size: 11px;
      color: var(--tx3);
      margin-top: 2px;
    }

    /* POOL */
    .pool-columns {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      align-items: flex-start;
    }

    .pool-col {
      min-width: 220px;
      flex: 0 0 220px;
    }

    .pool-col-hd {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: var(--rs);
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .pool-col-cnt {
      font-size: 11px;
      font-weight: 600;
      opacity: .7;
      margin-left: auto;
    }

    .pool-cards {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .pcard {
      background: var(--w);
      border: 1.5px solid var(--bd);
      border-radius: var(--r);
      padding: 11px 12px;
      cursor: pointer;
      transition: all .14s;
      position: relative;
      overflow: hidden;
    }

    .pcard:hover {
      border-color: var(--bl);
      box-shadow: var(--sh);
      transform: translateY(-1px);
    }

    .pcard-top {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 6px;
    }

    .pcard-unit {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pcard-unit img {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      object-fit: cover;
    }

    .pcard-unit-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--tx3);
    }

    .pcard-date {
      font-size: 10px;
      color: var(--tx3);
      margin-left: auto;
      white-space: nowrap;
    }

    .pcard-content {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--tx);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 6px;
    }

    .pcard-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pcard-scores {
      font-size: 10px;
      color: var(--tx3);
    }

    .pcard-claimed {
      font-size: 10px;
      color: var(--gn);
      font-weight: 700;
    }

    /* PROCESS */
    .proc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .proc-card {
      background: var(--w);
      border: 1.5px solid var(--bd);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: var(--sh);
    }

    .proc-card-hd {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .proc-card-unit {
      font-size: 13px;
      font-weight: 700;
      color: var(--bl);
    }

    .proc-cnt {
      font-size: 12px;
      color: var(--tx3);
    }

    .proc-issue {
      background: var(--bg3);
      border-radius: var(--rs);
      padding: 9px;
      cursor: pointer;
      margin-bottom: 5px;
      transition: all .12s;
    }

    .proc-issue:hover {
      background: var(--bg4);
    }

    .proc-issue-content {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .proc-issue-meta {
      font-size: 11px;
      color: var(--tx3);
      margin-top: 2px;
    }

    /* DASHBOARD */
    .month-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .month-card {
      background: var(--w);
      border: 1.5px solid var(--bd);
      border-radius: var(--r);
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: all .14s;
      position: relative;
    }

    .month-card:hover {
      border-color: var(--bl);
      box-shadow: var(--sh);
    }

    .month-card.cur {
      border-color: var(--gn);
      background: rgba(0, 184, 148, .04);
    }

    .month-card.sel {
      border-color: var(--bl);
      background: rgba(3, 97, 191, .05);
    }

    .month-num {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }

    .month-name {
      font-size: 11px;
      color: var(--tx3);
      margin: 3px 0;
    }

    .month-cnt {
      font-size: 12px;
      color: var(--tx2);
      font-weight: 600;
    }

    .month-badge {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gn);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .quad-wrap {
      background: var(--w);
      border: 1.5px solid var(--bd);
      border-radius: var(--r);
      padding: 20px;
      box-shadow: var(--sh);
      width: 100%;
    }

    .quad-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      text-align: center;
    }

    .quad-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 12px;
    }

    .quad-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }

    .quad-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* TOOLTIP */
    .quad-tooltip {
      position: fixed;
      background: rgba(26, 26, 46, .92);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      pointer-events: none;
      z-index: 999;
      max-width: 220px;
      display: none;
      box-shadow: var(--shl);
    }

    /* RESOLVED */
    .res-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--bd2);
      background: var(--w);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .12s;
    }

    .filter-btn.on {
      background: var(--bl);
      border-color: var(--bl);
      color: #fff;
    }

    .res-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    /* FILE */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg3);
      border-radius: var(--rs);
      font-size: 13px;
    }

    .file-item-name {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .file-item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .file-drop {
      border: 2px dashed var(--bd2);
      border-radius: var(--rs);
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: all .12s;
      font-size: 13px;
      color: var(--tx3);
    }

    .file-drop:hover,
    .file-drop.dragover {
      border-color: var(--bl);
      color: var(--bl);
      background: rgba(3, 97, 191, .03);
    }

    /* MODAL */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.on {
      display: flex;
    }

    .modal {
      background: var(--w);
      border-radius: var(--r);
      padding: 24px;
      width: 540px;
      max-width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: var(--shl);
      animation: popin .2s cubic-bezier(.34, 1.56, .64, 1);
    }

    .modal-lg {
      width: 660px;
    }

    .modal-sm {
      width: 420px;
    }

    .mclose {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: 1px solid var(--bd);
      background: var(--bg3);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--tx2);
    }

    .mclose:hover {
      background: var(--bg4);
    }

    .mtitle {
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 14px;
      padding-right: 32px;
    }

    /* UNIT SELECTOR */
    .usel-group {
      margin-bottom: 12px;
    }

    .usel-label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 7px;
    }

    .usel-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .usel-card {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 12px;
      background: var(--bg3);
      border: 1.5px solid var(--bd);
      border-radius: var(--rs);
      cursor: pointer;
      transition: all .14s;
      font-size: 13px;
      font-weight: 600;
    }

    .usel-card:hover {
      border-color: var(--bl);
      background: rgba(3, 97, 191, .05);
    }

    .usel-card.sel {
      border-color: var(--bl);
      background: rgba(3, 97, 191, .08);
      color: var(--bl);
    }

    .usel-card img {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      object-fit: cover;
    }

    .usel-card .ph-sm {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e5ba07;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 900;
      color: #7a5c00;
    }

    /* SOLUTION CHECKER */
    .sol-check-item {
      background: var(--bg3);
      border-radius: var(--rs);
      padding: 12px;
      margin-bottom: 8px;
      border: 1.5px solid var(--bd);
    }

    .sol-check-item.confirmed {
      border-color: var(--gn);
      background: rgba(0, 184, 148, .05);
    }

    .sol-check-unit {
      font-size: 12px;
      font-weight: 700;
      color: var(--bl);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sol-check-text {
      font-size: 13px;
      line-height: 1.5;
      color: var(--tx);
    }

    .sol-confirm-btn {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* MISC */
    .loading-lv {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, .94);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .loading-lv.hide {
      display: none;
    }

    .ldr {
      width: 44px;
      height: 44px;
      border: 3px solid var(--bg4);
      border-top-color: var(--bl);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .ldr-t {
      font-size: 14px;
      color: var(--tx2);
      font-weight: 500;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--tx);
      color: #fff;
      border-radius: var(--r);
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      z-index: 400;
      transform: translateY(70px);
      opacity: 0;
      transition: all .22s cubic-bezier(.34, 1.56, .64, 1);
      max-width: 320px;
      box-shadow: var(--shl);
    }

    .toast.on {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.ok {
      background: var(--gn);
    }

    .toast.err {
      background: var(--rd);
    }

    .empty {
      text-align: center;
      padding: 36px;
      color: var(--tx3);
      font-size: 14px;
    }

    .dh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .dh h2 {
      font-size: 20px;
      font-weight: 900;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg4);
      border-radius: 2px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes popin {
      from {
        opacity: 0;
        transform: scale(.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .stats-bar {
      display: flex;
      gap: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--w);
      border: 1.5px solid var(--bd);
      border-radius: var(--r);
      padding: 14px 20px;
      box-shadow: var(--sh);
      min-width: 130px;
      flex: 1;
    }

    .stat-val {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 12px;
      color: var(--tx3);
      margin-top: 4px;
    }

    .stat-rd {
      color: var(--rd);
    }

    .stat-gn {
      color: var(--gn);
    }

    .stat-bl {
      color: var(--bl);
    }

    .stat-pu {
      color: var(--pu);
    }

    .sol-confirm-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      gap: 8px;
    }

    .sol-confirmed-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: rgba(0, 184, 148, .12);
      border-radius: 20px;
      font-size: 12px;
      color: var(--gn);
      font-weight: 700;
    }

    .quad-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }

    .quad-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: 500;
    }

    .quad-legend-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
    }
  </style>
</head>

    function getSbKey() { return localStorage.getItem('ci_sb_key') || ''; }
    function fmtDate(d) { return d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' }) + WEEKDAYS[d.getDay()]; }

    // ── DB ──
    async function loadIssues() {
      if (!getSbKey() || !sb) {
        document.getElementById('loading-lv').classList.add('hide');
        openModal('modal-sb'); return false;
      }
      try {
        var r = await sb.from('issues').select('*').order('created_at', { ascending: false });
        if (r.error) throw r.error;
        issues = (r.data || []).map(mapRow);
        return true;
      } catch (e) {
        document.getElementById('loading-lv').classList.add('hide');
        toast('資料庫連線失敗：' + e.message, 'err'); return false;
      }
    }

    function mapRow(x) {
      return {
        id: x.id, unit: x.unit, content: x.content,
        tags: x.tags || [], tagsCustom: x.tags_custom || '',
        urgency: typeof x.urgency === 'number' ? x.urgency : 0,
        importance: typeof x.importance === 'number' ? x.importance : 0,
        claimedBy: x.claimed_by || [],
        solutions: x.solutions || [],
        confirmedBy: x.confirmed_by || [],
        resolved: x.resolved || false,
        confirmedResolved: x.confirmed_resolved || false,
        resolvedAt: x.resolved_at, createdAt: x.created_at
      };
    }

    // saveIssueDB: only safe columns (no solutions/confirmed_by - those come later via patchDB)
    async function saveIssueDB(issue) {
      var r = await sb.from('issues').upsert({
        id: issue.id, unit: issue.unit, content: issue.content,
        tags: issue.tags, tags_custom: issue.tagsCustom,
        urgency: issue.urgency, importance: issue.importance,
        claimed_by: [], solutions: [], confirmed_by: [],
        resolved: false, confirmed_resolved: false,
        resolved_at: null, created_at: issue.createdAt
      });
      if (r.error) throw r.error;
    }

    async function patchDB(id, fields) {
      var d = {};
      if (fields.claimedBy !== undefined) d.claimed_by = fields.claimedBy;
      if (fields.solutions !== undefined) d.solutions = fields.solutions;
      if (fields.confirmedBy !== undefined) d.confirmed_by = fields.confirmedBy;
      if (fields.resolved !== undefined) d.resolved = fields.resolved;
      if (fields.confirmedResolved !== undefined) d.confirmed_resolved = fields.confirmedResolved;
      if (fields.resolvedAt !== undefined) d.resolved_at = fields.resolvedAt;
      var r = await sb.from('issues').update(d).eq('id', id);
      if (r.error) throw r.error;
    }

    // ── FILE UPLOAD ──
    async function uploadFile(file, issueId) {
      var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      var path = issueId + '/' + Date.now() + '_' + safeName;
      var r = await sb.storage.from('issue-files').upload(path, file, { upsert: true });
      if (r.error) throw r.error;
      var pub = sb.storage.from('issue-files').getPublicUrl(path);
      return { name: file.name, url: pub.data.publicUrl, path: path };
    }

    // ── NAV ──
    function showPg(name) {
      document.querySelectorAll('.pg').forEach(function (p) { p.classList.remove('on'); });
      document.querySelectorAll('.nb').forEach(function (b) { b.classList.remove('on'); });
      document.getElementById('pg-' + name).classList.add('on');
      var t = document.getElementById('tab-' + name); if (t) t.classList.add('on');
      // Reload fresh data from DB on every tab switch
      refreshAndRender(name);
    }

    async function refreshAndRender(name) {
      try {
        var r = await sb.from('issues').select('*').order('created_at', { ascending: false });
        if (!r.error) issues = (r.data || []).map(mapRow);
      } catch (e) { /* use cached data */ }
      updateTabBadges();
      if (name === 'report') renderReportOverview();
      if (name === 'pool') renderPool();
      if (name === 'process') renderProcess();
      if (name === 'dash') renderDash();
      if (name === 'resolved') renderResolved();
    }

    // ── STATS (shared) ──
    function getStats() {
      var total = issues.length;
      var resolved = issues.filter(function (i) { return i.confirmedResolved; }).length;
      var rate = total > 0 ? Math.round(resolved / total * 100) : 0;
      var open = total - resolved;
      return { total: total, resolved: resolved, rate: rate, open: open };
    }

    function renderStatsBar(containerId) {
      var el = document.getElementById(containerId);
      if (!el) return;
      var s = getStats();
      el.innerHTML =
        '<div class="stat-card"><div class="stat-val stat-bl">' + s.total + '</div><div class="stat-lbl">總問題數</div></div>'
        + '<div class="stat-card"><div class="stat-val stat-rd">' + s.open + '</div><div class="stat-lbl">待解決</div></div>'
        + '<div class="stat-card"><div class="stat-val stat-gn">' + s.resolved + '</div><div class="stat-lbl">已解決</div></div>'
        + '<div class="stat-card"><div class="stat-val stat-pu">' + s.rate + '%</div><div class="stat-lbl">解決率</div></div>';
    }

    // ── REPORT ──
    function renderReportOverview() {
      renderStatsBar('report-stats');
      var groups = [
        { level: 'hsjh', label: '國高中部', cls: 'bgl-hsjh', branches: BRANCHES_HSJH_DATA },
        { level: 'es', label: '國小部', cls: 'bgl-es', branches: BRANCHES_ES_DATA }
      ];
      var container = document.getElementById('report-overview');
      container.innerHTML = '';
      groups.forEach(function (g) {
        var grpEl = document.createElement('div'); grpEl.className = 'branch-group';
        var hd = document.createElement('div'); hd.className = 'branch-group-hd';
        var lbl = document.createElement('span'); lbl.className = 'branch-group-label ' + g.cls; lbl.textContent = g.label;
        hd.appendChild(lbl); grpEl.appendChild(hd);
        var cards = document.createElement('div'); cards.className = 'branch-cards';
        g.branches.forEach(function (b) {
          var cnt = issues.filter(function (i) { return i.unit === b.name && !i.confirmedResolved; }).length;
          var card = document.createElement('div'); card.className = 'branch-card ' + g.level;
          card.onclick = (function (name) { return function () { openReportModal(name); }; })(b.name);
          var dot = document.createElement('div'); dot.className = 'b-dot ' + (cnt > 0 ? 'red' : 'grn'); card.appendChild(dot);
          if (LOGOS[b.name]) { var img = document.createElement('img'); img.src = LOGOS[b.name]; card.appendChild(img); }
          else { var ph = document.createElement('div'); ph.className = 'ph'; ph.textContent = '騰'; card.appendChild(ph); }
          var nm = document.createElement('div'); nm.className = 'branch-card-name'; nm.textContent = b.name; card.appendChild(nm);
          var ce = document.createElement('div'); ce.className = 'branch-card-cnt'; ce.textContent = cnt > 0 ? cnt + ' 個問題' : ''; card.appendChild(ce);
          cards.appendChild(card);
        });
        grpEl.appendChild(cards); container.appendChild(grpEl);
      });
    }

    function openReportModal(unit) {
      reportUnit = unit;
      document.getElementById('report-modal-unit-name').textContent = unit;
      var logoEl = document.getElementById('report-modal-logo');
      if (LOGOS[unit]) { logoEl.src = LOGOS[unit]; logoEl.style.display = 'block'; }
      else logoEl.style.display = 'none';
      selTags = []; urgencyVal = -1; importanceVal = -1;
      document.getElementById('f-content').value = '';
      initTagChips(); clearScoreBtns('urgency'); clearScoreBtns('importance');
      renderMiniList(unit);
      openModal('modal-report');
    }

    function clearScoreBtns(type) {
      document.querySelectorAll('.score-btn[data-type="' + type + '"]').forEach(function (b) { b.classList.remove('sel'); });
    }

    function initTagChips() {
      var row = document.getElementById('tag-row'); row.innerHTML = '';
      TAGS.forEach(function (t) {
        var chip = document.createElement('div');
        chip.className = 'tag-chip tc-' + t; chip.textContent = t;
        chip.onclick = function () { toggleTag(t, chip); };
        row.appendChild(chip);
      });
      document.getElementById('tag-other-wrap').style.display = 'none';
    }

    function toggleTag(t, chip) {
      var idx = selTags.indexOf(t);
      if (idx >= 0) { selTags.splice(idx, 1); chip.classList.remove('sel'); chip.style.background = ''; chip.style.borderColor = ''; }
      else { selTags.push(t); chip.classList.add('sel'); chip.style.background = TAG_COLORS[t] || '#0361bf'; chip.style.borderColor = TAG_COLORS[t] || '#0361bf'; }
      document.getElementById('tag-other-wrap').style.display = selTags.indexOf('其他') >= 0 ? 'block' : 'none';
    }

    function setScoreBtn(type, val) {
      document.querySelectorAll('.score-btn[data-type="' + type + '"]').forEach(function (b) {
        b.classList.toggle('sel', parseInt(b.dataset.val) === val);
      });
      if (type === 'urgency') urgencyVal = val; else importanceVal = val;
    }

    function renderMiniList(unit) {
      var list = issues.filter(function (i) { return i.unit === unit; });
      var el = document.getElementById('report-mini-list');
      document.getElementById('report-mini-hd').textContent = unit + ' 的問題清單（' + list.length + ' 個）';
      if (!list.length) { el.innerHTML = '<div class="empty" style="padding:14px;font-size:13px">尚無問題</div>'; return; }
      el.innerHTML = '';
      list.forEach(function (i) {
        var item = document.createElement('div'); item.className = 'issue-mini';
        item.onclick = (function (id) { return function () { closeModal('modal-report'); setTimeout(function () { openIssueDetail(id); }, 150); }; })(i.id);
        var td = document.createElement('div'); td.className = 'issue-mini-tags';

    async function submitIssue() {
      if (!reportUnit) { toast('請選擇分校', 'err'); return; }
      if (!getSbKey() || !sb) { openModal('modal-sb'); return; }
      var content = document.getElementById('f-content').value.trim();
      if (!content) { toast('請填寫問題內容', 'err'); return; }
      if (selTags.length === 0) { toast('請選擇至少一個標籤', 'err'); return; }
      if (urgencyVal < 0) { toast('請選擇緊急度', 'err'); return; }
      if (importanceVal < 0) { toast('請選擇重要性', 'err'); return; }
      var tagsCustom = selTags.indexOf('其他') >= 0 ? document.getElementById('f-tag-other').value.trim() : '';
      var btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = '提報中...';
      var issue = {
        id: Date.now().toString(), unit: reportUnit, content: content,
        tags: selTags.slice(), tagsCustom: tagsCustom,
        urgency: urgencyVal, importance: importanceVal,
        claimedBy: [], solutions: [], confirmedBy: [],
        resolved: false, confirmedResolved: false,
        resolvedAt: null, createdAt: new Date().toISOString()
      };
      try {
        await saveIssueDB(issue);
        issues.unshift(issue);
        toast('問題已提報！', 'ok');
        document.getElementById('f-content').value = '';
        selTags = []; initTagChips(); clearScoreBtns('urgency'); clearScoreBtns('importance');
        urgencyVal = -1; importanceVal = -1;
        renderMiniList(reportUnit); renderReportOverview(); updateTabBadges();
      } catch (e) { toast('提報失敗：' + e.message, 'err'); console.error(e); }
      btn.disabled = false; btn.textContent = '送出問題';
    }

    // ── POOL ──
    function updateTabBadges() {
      var open = issues.filter(function (i) { return !i.confirmedResolved; }).length;
      var t = document.getElementById('tab-pool');
      if (t) t.textContent = '問題庫' + (open ? ' (' + open + ')' : '');
      var pc = 0;
      ALL_BRANCHES.forEach(function (b) {
        pc += issues.filter(function (i) { return !i.confirmedResolved && i.claimedBy && i.claimedBy.indexOf(b) >= 0; }).length;
      });
      var tp = document.getElementById('tab-process');
      if (tp) tp.textContent = '問題處理區' + (pc ? ' (' + pc + ')' : '');
    }

    function renderPool() {
      renderStatsBar('pool-stats');
      var pool = issues.filter(function (i) { return !i.confirmedResolved; });
      if (poolTagFilter !== 'all') pool = pool.filter(function (i) { return i.tags.indexOf(poolTagFilter) >= 0; });
      var ftEl = document.getElementById('pool-filters'); ftEl.innerHTML = '';
      ['all'].concat(TAGS).forEach(function (t) {
        var btn = document.createElement('button');
        btn.className = 'filter-btn' + (poolTagFilter === t ? ' on' : '');
        btn.textContent = t === 'all' ? '全部' : t;
        btn.onclick = (function (tag) { return function () { poolTagFilter = tag; renderPool(); }; })(t);
        ftEl.appendChild(btn);
      });
      var colsEl = document.getElementById('pool-columns'); colsEl.innerHTML = '';
      if (!pool.length) { colsEl.innerHTML = '<div class="empty">目前沒有待解決的問題</div>'; return; }
      if (poolTagFilter !== 'all') {
        colsEl.appendChild(buildPoolCol(poolTagFilter, pool));
      } else {
        var tagGroups = {};
        pool.forEach(function (i) { var p = i.tags.length ? i.tags[0] : '其他'; if (!tagGroups[p]) tagGroups[p] = []; tagGroups[p].push(i); });
        TAGS.forEach(function (t) { if (tagGroups[t] && tagGroups[t].length) colsEl.appendChild(buildPoolCol(t, tagGroups[t])); });
      }
    }

    function buildPoolCol(tag, list) {
      var col = document.createElement('div'); col.className = 'pool-col';
      var hd = document.createElement('div'); hd.className = 'pool-col-hd';
      hd.style.background = (TAG_COLORS[tag] || '#7f8c8d') + '18';
      hd.style.color = TAG_COLORS[tag] || '#7f8c8d';
      hd.innerHTML = '<span>' + tag + '</span><span class="pool-col-cnt">' + list.length + '</span>';
      col.appendChild(hd);
      var cards = document.createElement('div'); cards.className = 'pool-cards';
      list.forEach(function (issue) { cards.appendChild(buildPoolCard(issue)); });
      col.appendChild(cards);
      return col;
    }

    function buildPoolCard(issue) {
      var card = document.createElement('div'); card.className = 'pcard';
      card.onclick = (function (id) { return function () { openIssueDetail(id); }; })(issue.id);
      var d = new Date(issue.createdAt);
      // Top row
      var top = document.createElement('div'); top.className = 'pcard-top';
      var ud = document.createElement('div'); ud.className = 'pcard-unit';

      var un = document.createElement('span'); un.className = 'pcard-unit-name'; un.textContent = issue.unit; ud.appendChild(un);
      top.appendChild(ud);
      var ds = document.createElement('span'); ds.className = 'pcard-date'; ds.textContent = fmtDate(d); top.appendChild(ds);
      card.appendChild(top);
      // Content
      var ct = document.createElement('div'); ct.className = 'pcard-content'; ct.textContent = issue.content; card.appendChild(ct);
      // Footer
      var ft = document.createElement('div'); ft.className = 'pcard-footer';
      var sc = document.createElement('span'); sc.className = 'pcard-scores'; sc.textContent = '緊急' + issue.urgency + ' 重要' + issue.importance; ft.appendChild(sc);
      if (issue.claimedBy && issue.claimedBy.length) {
        var cl = document.createElement('span'); cl.className = 'pcard-claimed'; cl.textContent = '▶ ' + issue.claimedBy.join('、') + ' 認領中'; ft.appendChild(cl);
      }

    // ── ISSUE DETAIL ──
    function openIssueDetail(id) {
      var issue = issues.find(function (i) { return i.id === id; });
      if (!issue) return;
      activeIssueId = id;
      var d = new Date(issue.createdAt);
      var tagsHtml = issue.tags.map(function (t) {
        var l = t === '其他' && issue.tagsCustom ? issue.tagsCustom : t;
        return '<span class="itag tc-' + t + '">' + l + '</span>';
      }).join('');

      // Solutions - with confirm button for issue owner
      var solsHtml = '';
      var sols = issue.solutions || [];
      var isOwner = issue.unit === reportUnit;
      if (sols.length) {
        solsHtml = '<div style="margin-top:14px"><div class="flbl" style="margin-bottom:8px">解法（' + sols.length + ' 個）</div>';
        sols.forEach(function (s, idx) {
          var cb = issue.confirmedBy || [];
          var confirmed = cb.indexOf(idx) >= 0;
          var fHtml = '';
          if (s.files && s.files.length) {
            fHtml = '<div class="file-list" style="margin-top:6px">';
            s.files.forEach(function (f) {
              var isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
              fHtml += '<div class="file-item"><span class="file-item-name">📎 ' + f.name + '</span>'
                + '<div class="file-item-actions">'
                + (isImg ? '<a href="' + f.url + '" target="_blank" class="btn btn-xs">預覽</a>' : '')
                + '<a href="' + f.url + '" download="' + f.name + '" class="btn btn-xs">下載</a>'
                + '</div></div>';
            });
            fHtml += '</div>';
          }
          var confirmRow = '<div class="sol-confirm-row">';
          if (confirmed) {
            confirmRow += '<span class="sol-confirmed-badge">✓ 已確認有效，問題已解決</span>';
          } else {
            confirmRow += '<span style="font-size:12px;color:var(--tx3)">提出方（' + issue.unit + '）確認解法有效後問題解決</span>'
              + '<button class="btn btn-gn btn-sm" onclick="confirmSolutionAndResolve(' + idx + ')">✓ 確認有效</button>';
          }
          confirmRow += '</div>';
          solsHtml += '<div class="sol-check-item' + (confirmed ? ' confirmed' : '') + '">'
            + '<div class="sol-check-unit">'
            + (LOGOS[s.unit] ? '<img src="' + LOGOS[s.unit] + '" style="width:18px;height:18px;border-radius:50%;object-fit:cover">' : '')
            + ' ' + s.unit + '</div>'
            + '<div class="sol-check-text">' + s.text + '</div>'
            + fHtml + confirmRow + '</div>';
        });
        solsHtml += '</div>';
      }

      var claimedHtml = '';
      if (issue.claimedBy && issue.claimedBy.length) {
        claimedHtml = '<div style="margin-top:10px;font-size:13px"><b style="color:var(--bl)">認領中：</b>' + issue.claimedBy.join('、') + '</div>';
      }

      var actionBtns = '';
      if (!isOwner && !issue.confirmedResolved) {
        actionBtns = '<button class="btn btn-gn" onclick="openClaimModal()" style="margin-top:14px;width:100%">選擇解決這題的分校</button>';
      }

      document.getElementById('issue-detail-body').innerHTML =
        '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">' + tagsHtml + '</div>'
        + '<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">'
        + (LOGOS[issue.unit] ? '<img src="' + LOGOS[issue.unit] + '" style="width:26px;height:26px;border-radius:50%;object-fit:cover">' : '')
        + '<b>' + issue.unit + '</b><span style="font-size:12px;color:var(--tx3);margin-left:auto">' + fmtDate(d) + '</span></div>'
        + '<div style="font-size:15px;line-height:1.7;margin-bottom:10px">' + issue.content + '</div>'
        + '<div style="display:flex;gap:10px">'
        + '<span style="font-size:13px;background:var(--bg3);padding:4px 10px;border-radius:8px">緊急 <b>' + issue.urgency + '/5</b></span>'
        + '<span style="font-size:13px;background:var(--bg3);padding:4px 10px;border-radius:8px">重要 <b>' + issue.importance + '/5</b></span>'
        + '</div>'
        + claimedHtml + solsHtml + actionBtns;

      openModal('modal-issue-detail');
    }

    // ── CONFIRM SOLUTION → RESOLVE ──
    async function confirmSolutionAndResolve(solIdx) {
      var issue = issues.find(function (i) { return i.id === activeIssueId; });
      if (!issue) return;
      var cb = Array.isArray(issue.confirmedBy) ? issue.confirmedBy.slice() : [];
      if (cb.indexOf(solIdx) < 0) cb.push(solIdx);
      var now = new Date().toISOString();
      issue.confirmedBy = cb;
      issue.confirmedResolved = true; issue.resolved = true; issue.resolvedAt = now;
      try {
        await patchDB(issue.id, { confirmedBy: cb, confirmedResolved: true, resolved: true, resolvedAt: now });
        toast('已確認解法！問題移入已解決', 'ok');
        closeModal('modal-issue-detail');
        // refresh all views
        renderPool(); renderProcess(); renderResolved();
        renderReportOverview(); updateTabBadges();
        if (document.getElementById('pg-dash').classList.contains('on')) renderDash();
      } catch (e) {
        toast('確認失敗：' + e.message, 'err'); console.error(e);
        issue.confirmedBy = cb.slice(0, -1); issue.confirmedResolved = false; issue.resolved = false;
      }
    }

      claimSelUnit = null;

      var body = document.getElementById('claim-unit-body'); body.innerHTML = '';
      var groups = [
        { label: '國高中部', cls: 'bgl-hsjh', units: ['青埔升大校', '大園參天校', '園中方舟校', '中壢心夢想校', '青埔旭日校'] },
        { label: '國小部', cls: 'bgl-es', units: ['青埔翱翔校', '青園展翅校', '大園晨光校', '快樂騰雲校', '文化極光校', '內壢森耀校', '竹北知行校'] }
      ];
      groups.forEach(function (g) {
        var grp = document.createElement('div'); grp.className = 'usel-group';

          var nm = document.createElement('span'); nm.textContent = u; card.appendChild(nm);

    async function confirmClaim() {
      if (!claimSelUnit) { toast('請選擇一個分校', 'err'); return; }
      var issue = issues.find(function (i) { return i.id === activeIssueId; });
      if (!issue) return;
      var btn = document.getElementById('claim-confirm-btn');
      btn.disabled = true; btn.textContent = '處理中...';
      var claimed = issue.claimedBy.slice();
      if (claimed.indexOf(claimSelUnit) < 0) claimed.push(claimSelUnit);
      try {
        await patchDB(issue.id, { claimedBy: claimed });
        issue.claimedBy = claimed;
        toast(claimSelUnit + ' 已認領此問題', 'ok');
        closeModal('modal-claim');
        openIssueDetail(activeIssueId);
        renderPool(); updateTabBadges();
      } catch (e) { toast('認領失敗：' + e.message, 'err'); console.error(e); }
      btn.disabled = false; btn.textContent = '確認認領';
    }

    // ── PROCESS ──
    function renderProcess() {
      var grid = document.getElementById('process-grid'); grid.innerHTML = '';
      var hasSth = false;
      ALL_BRANCHES.forEach(function (b) {
        var myI = issues.filter(function (i) { return !i.confirmedResolved && i.claimedBy && i.claimedBy.indexOf(b) >= 0; });
        if (!myI.length) return;
        hasSth = true;
        var card = document.createElement('div'); card.className = 'proc-card';
        var hd = document.createElement('div'); hd.className = 'proc-card-hd';
        if (LOGOS[b]) { var img = document.createElement('img'); img.src = LOGOS[b]; img.style.cssText = 'width:24px;height:24px;border-radius:50%;object-fit:cover'; hd.appendChild(img); }
        var nm = document.createElement('span'); nm.className = 'proc-card-unit'; nm.textContent = b;
        var cnt = document.createElement('span'); cnt.className = 'proc-cnt'; cnt.textContent = '(' + myI.length + ' 題)';
        hd.appendChild(nm); hd.appendChild(cnt); card.appendChild(hd);
        myI.forEach(function (issue) {
          var item = document.createElement('div'); item.className = 'proc-issue';
          item.onclick = (function (id, unit) { return function () { openSolutionModal(id, unit); }; })(issue.id, b);
          var ct = document.createElement('div'); ct.className = 'proc-issue-content';
          ct.textContent = issue.content.length > 40 ? issue.content.slice(0, 40) + '...' : issue.content;
          var sols = issue.solutions || [];
          var mySol = sols.find(function (s) { return s.unit === b; });
          var mt = document.createElement('div'); mt.className = 'proc-issue-meta';
          mt.textContent = '提報：' + issue.unit + (mySol ? '　✏ 已有解法' : '　點擊輸入解法');
          item.appendChild(ct); item.appendChild(mt); card.appendChild(item);
        });
        grid.appendChild(card);
      });
      if (!hasSth) grid.innerHTML = '<div class="empty">目前沒有分校認領問題</div>';

    // ── SOLUTION MODAL ──
    function openSolutionModal(id, claimUnit) {
      activeIssueId = id; solUploadFiles = []; solClaimUnit = claimUnit;
      var issue = issues.find(function (i) { return i.id === id; });
      if (!issue) return;
      var sols = issue.solutions || [];
      var mySol = sols.find(function (s) { return s.unit === claimUnit; });
      document.getElementById('sol-issue-title').textContent = issue.content.slice(0, 60) + (issue.content.length > 60 ? '...' : '');
      document.getElementById('sol-unit-name').textContent = claimUnit + ' 的解法';
      document.getElementById('sol-input').value = mySol ? mySol.text : '';
      // Show existing files
      var existFiles = mySol ? mySol.files || [] : [];
      renderExistingFiles(existFiles);
      renderSolUploadList();
      openModal('modal-solution');
    }

    function renderExistingFiles(files) {
      var el = document.getElementById('sol-existing-files'); el.innerHTML = '';
      if (!files.length) return;
      var hd = document.createElement('div'); hd.style.cssText = 'font-size:12px;font-weight:700;color:var(--tx3);margin-bottom:6px'; hd.textContent = '已上傳檔案'; el.appendChild(hd);
      files.forEach(function (f) {
        var item = document.createElement('div'); item.className = 'file-item';
        var isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
        var nm = document.createElement('span'); nm.className = 'file-item-name'; nm.textContent = (isImg ? '🖼 ' : '📎 ') + f.name;
        var acts = document.createElement('div'); acts.className = 'file-item-actions';
        if (isImg) { var pv = document.createElement('a'); pv.href = f.url; pv.target = '_blank'; pv.className = 'btn btn-xs'; pv.textContent = '預覽'; acts.appendChild(pv); }
        var dl = document.createElement('a'); dl.href = f.url; dl.download = f.name; dl.className = 'btn btn-xs'; dl.textContent = '下載'; acts.appendChild(dl);
        item.appendChild(nm); item.appendChild(acts); el.appendChild(item);
      });
    }

    function renderSolUploadList() {
      var el = document.getElementById('sol-upload-list'); el.innerHTML = '';
      if (!solUploadFiles.length) return;
      var hd = document.createElement('div'); hd.style.cssText = 'font-size:12px;font-weight:700;color:var(--tx3);margin-bottom:6px'; hd.textContent = '待上傳檔案（' + solUploadFiles.length + ' 個）'; el.appendChild(hd);
      solUploadFiles.forEach(function (f, idx) {
        var item = document.createElement('div'); item.className = 'file-item';
        var isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
        var nm = document.createElement('span'); nm.className = 'file-item-name'; nm.textContent = (isImg ? '🖼 ' : '📎 ') + f.name + ' (' + Math.round(f.size / 1024) + 'KB)';
        var del = document.createElement('button'); del.className = 'btn btn-xs btn-rd'; del.textContent = '移除';
        del.onclick = (function (i) { return function () { solUploadFiles.splice(i, 1); renderSolUploadList(); }; })(idx);
        item.appendChild(nm); item.appendChild(del); el.appendChild(item);
      });
    }

    function handleFileSelect(files) {
      for (var i = 0; i < files.length; i++) {
        var f = files[i];
        if (f.size > 10 * 1024 * 1024) { toast(f.name + ' 超過 10MB 限制', 'err'); continue; }
        var dup = solUploadFiles.find(function (x) { return x.name === f.name && x.size === f.size; });
        if (!dup) solUploadFiles.push(f);
      }
      renderSolUploadList();
      document.getElementById('sol-file-input').value = '';
    }

    async function saveSolution() {
      var issue = issues.find(function (i) { return i.id === activeIssueId; });
      if (!issue) return;
      var solText = document.getElementById('sol-input').value.trim();
      if (!solText && solUploadFiles.length === 0) { toast('請輸入解法說明或上傳檔案', 'err'); return; }
      var btn = document.getElementById('sol-save-btn');
      btn.disabled = true; btn.textContent = '儲存中...';
      try {
        var newFiles = [];
        for (var fi = 0; fi < solUploadFiles.length; fi++) {
          var uf = await uploadFile(solUploadFiles[fi], issue.id);
          newFiles.push(uf);
        }
        var sols = JSON.parse(JSON.stringify(issue.solutions || []));
        var existIdx = -1;
        for (var si = 0; si < sols.length; si++) { if (sols[si].unit === solClaimUnit) { existIdx = si; break; } }
        var existFiles = existIdx >= 0 ? (sols[existIdx].files || []) : [];
        var solObj = { unit: solClaimUnit, text: solText, files: existFiles.concat(newFiles), updatedAt: new Date().toISOString() };
        if (existIdx >= 0) sols[existIdx] = solObj; else sols.push(solObj);
        issue.solutions = sols;
        await patchDB(issue.id, { solutions: sols });
        solUploadFiles = [];
        renderSolUploadList();
        renderExistingFiles(solObj.files);
        toast('解法已儲存！', 'ok');
        // Update pool card immediately
        renderPool(); renderProcess();
      } catch (e) { toast('儲存失敗：' + e.message, 'err'); console.error(e); }
      btn.disabled = false; btn.textContent = '儲存解法';
    }

    // ── DASHBOARD ──
    function renderDash() {
      renderStatsBar('dash-stats');
      var now = new Date();
      var mg = document.getElementById('month-grid'); mg.innerHTML = '';
      for (var m = 0; m < 12; m++) {
        var mI = issues.filter(function (i) { var d = new Date(i.createdAt); return d.getMonth() === m && d.getFullYear() === curYear; });
        var mR = mI.filter(function (i) { return i.confirmedResolved; }).length;
        var isCur = m === now.getMonth() && curYear === now.getFullYear();
        var isSel = m === selMonth;
        var card = document.createElement('div');
        card.className = 'month-card' + (isCur ? ' cur' : '') + (isSel ? ' sel' : '');
        card.onclick = (function (mo) { return function () { selMonth = mo; renderDash(); }; })(m);
        card.innerHTML = (isCur ? '<div class="month-badge">本月</div>' : '')
          + '<div class="month-num">' + (m + 1) + '</div>'
          + '<div class="month-name">' + MONTH_NAMES[m] + '</div>'
          + '<div class="month-cnt">' + mI.length + ' 題' + (mR ? '・' + mR + ' 解決' : '') + '</div>';
        mg.appendChild(card);
      }
      var selI = issues.filter(function (i) { var d = new Date(i.createdAt); return d.getMonth() === selMonth && d.getFullYear() === curYear; });
      document.getElementById('dash-month-title').textContent = (selMonth + 1) + '月份問題分析（' + selI.length + ' 個）';
      drawQuadrant(selI);
    }

    function drawQuadrant(data) {
      var container = document.getElementById('quad-container'); container.innerHTML = '';
      var W = 760, H = 560, padL = 72, padR = 50, padT = 50, padB = 72;
      var iw = W - padL - padR, ih = H - padT - padB;
      var ns = 'http://www.w3.org/2000/svg';
      var svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
      svg.style.width = '100%'; svg.style.height = 'auto';

      function el(tag, attrs) { var e = document.createElementNS(ns, tag); Object.keys(attrs).forEach(function (k) { e.setAttribute(k, attrs[k]); }); return e; }
      function txt(t, x, y, anchor, fill, size, bold, rotate) {
        var e = document.createElementNS(ns, 'text');
        e.textContent = t;
        e.setAttribute('x', x); e.setAttribute('y', y);
        e.setAttribute('text-anchor', anchor || 'middle');
        e.setAttribute('font-size', size || '12');
        e.setAttribute('fill', fill || '#888');
        e.setAttribute('font-family', 'Noto Sans TC,sans-serif');
        if (bold) e.setAttribute('font-weight', '700');
        if (rotate) e.setAttribute('transform', 'rotate(' + rotate + ' ' + x + ' ' + y + ')');
        return e;
      }

      var cx = padL + iw / 2, cy = padT + ih / 2;

      // BG quadrants
      svg.appendChild(el('rect', { x: padL, y: padT, width: iw / 2, height: ih / 2, fill: 'rgba(231,76,60,.06)' }));
      svg.appendChild(el('rect', { x: cx, y: padT, width: iw / 2, height: ih / 2, fill: 'rgba(3,97,191,.06)' }));
      svg.appendChild(el('rect', { x: padL, y: cy, width: iw / 2, height: ih / 2, fill: 'rgba(150,150,150,.04)' }));
      svg.appendChild(el('rect', { x: cx, y: cy, width: iw / 2, height: ih / 2, fill: 'rgba(0,184,148,.05)' }));

      // Axes
      svg.appendChild(el('line', { x1: padL - 12, y1: cy, x2: W - padR + 18, y2: cy, stroke: '#444', 'stroke-width': '1.8' }));
      svg.appendChild(el('line', { x1: cx, y1: H - padB + 12, x2: cx, y2: padT - 18, stroke: '#444', 'stroke-width': '1.8' }));
      // Arrow right
      svg.appendChild(el('polygon', { points: (W - padR + 18) + ',' + cy + ' ' + (W - padR + 8) + ',' + (cy - 5) + ' ' + (W - padR + 8) + ',' + (cy + 5), fill: '#444' }));
      // Arrow up
      svg.appendChild(el('polygon', { points: cx + ',' + (padT - 18) + ' ' + (cx - 5) + ',' + (padT - 8) + ' ' + (cx + 5) + ',' + (padT - 8), fill: '#444' }));

      // Axis labels OUTSIDE quadrant
      // Y axis: 緊急 (top, above arrow), 不緊急 (bottom)
      svg.appendChild(txt('緊急', cx, padT - 22, 'middle', '#e74c3c', '13', true));
      svg.appendChild(txt('不緊急', cx, H - padB + 36, 'middle', '#aaa', '13', true));
      // X axis: 不重要 (left), 重要 (right, after arrow)
      svg.appendChild(txt('不重要', padL - 8, cy + 4, 'end', '#aaa', '13', true));
      svg.appendChild(txt('重要', W - padR + 22, cy + 4, 'start', '#0361bf', '13', true));

      // Dots with hover tooltip
      var tooltip = document.getElementById('quad-tooltip');
      // Count overlapping positions for jitter
      var posCount = {};
      data.forEach(function (issue) {
        if (issue.confirmedResolved) return;
        var key = issue.urgency + '_' + issue.importance;
        posCount[key] = (posCount[key] || 0) + 1;
      });
      var posIdx = {};
      data.forEach(function (issue) {
        if (issue.confirmedResolved) return;
        var key = issue.urgency + '_' + issue.importance;
        var total = posCount[key] || 1;
        var idx = posIdx[key] || 0;
        posIdx[key] = idx + 1;
        var baseX = padL + (issue.importance / 5) * iw;
        var baseY = padT + ((5 - issue.urgency) / 5) * ih;
        var jitter = total > 1 ? 14 : 0;
        var angle = (idx / total) * Math.PI * 2;
        var dotX = baseX + (total > 1 ? Math.cos(angle) * jitter : 0);
        var dotY = baseY + (total > 1 ? Math.sin(angle) * jitter : 0);
        var color = issue.tags.length ? (TAG_COLORS[issue.tags[0]] || '#0361bf') : '#0361bf';
        var circle = document.createElementNS(ns, 'circle');
        circle.setAttribute('cx', dotX); circle.setAttribute('cy', dotY);
        circle.setAttribute('r', '11');
        circle.setAttribute('fill', color);
        circle.setAttribute('fill-opacity', '0.88');
        circle.setAttribute('stroke', 'white'); circle.setAttribute('stroke-width', '2');
        circle.style.cursor = 'pointer';
        // Hover: show unit, tags, urgency, importance (NOT content)
        circle.addEventListener('mouseenter', function (e) {
          var tagLabel = issue.tags.map(function (t) { return t === '其他' && issue.tagsCustom ? issue.tagsCustom : t; }).join('、');
          tooltip.innerHTML = '<b>' + issue.unit + '</b><br>標籤：' + tagLabel + '<br>緊急度：' + issue.urgency + ' / 重要性：' + issue.importance;
          tooltip.style.display = 'block';
          tooltip.style.left = (e.clientX + 14) + 'px'; tooltip.style.top = (e.clientY - 10) + 'px';
        });
        circle.addEventListener('mousemove', function (e) {
          tooltip.style.left = (e.clientX + 14) + 'px'; tooltip.style.top = (e.clientY - 10) + 'px';
        });
        circle.addEventListener('mouseleave', function () { tooltip.style.display = 'none'; });
        circle.addEventListener('click', (function (id) { return function () { openIssueDetail(id); }; })(issue.id));
        svg.appendChild(circle);
      });

      var openData = data.filter(function (i) { return !i.confirmedResolved; });
      if (!openData.length) {
        var nt = document.createElementNS(ns, 'text');
        nt.textContent = '此月份尚無待解決問題';
        nt.setAttribute('x', W / 2); nt.setAttribute('y', H / 2);
        nt.setAttribute('text-anchor', 'middle');
        nt.setAttribute('font-size', '14'); nt.setAttribute('fill', '#aaa');
        svg.appendChild(nt);
      }
      container.appendChild(svg);
    }

    // ── RESOLVED ──
    function renderResolved() {
      renderStatsBar('resolved-stats');
      var res = issues.filter(function (i) { return i.confirmedResolved; });
      var ftEl = document.getElementById('res-filters'); ftEl.innerHTML = '';
      ['all'].concat(ALL_BRANCHES).forEach(function (u) {
        var btn = document.createElement('button');
        btn.className = 'filter-btn' + (resFilter === u ? ' on' : '');
        btn.textContent = u === 'all' ? '全部分校' : u;
        btn.onclick = (function (unit) { return function () { resFilter = unit; renderResolved(); }; })(u);
        ftEl.appendChild(btn);
      });
      var filtered = resFilter === 'all' ? res : res.filter(function (i) { return i.unit === resFilter; });
      var grid = document.getElementById('res-grid'); grid.innerHTML = '';
      if (!filtered.length) { grid.innerHTML = '<div class="empty">尚無已解決的問題</div>'; return; }
      filtered.forEach(function (i) {
        var card = document.createElement('div'); card.className = 'pcard'; card.style.aspectRatio = 'unset';
        card.onclick = (function (id) { return function () { openIssueDetail(id); }; })(i.id);
        var d = new Date(i.resolvedAt || i.createdAt);
        var tagsHtml = i.tags.map(function (t) { var l = t === '其他' && i.tagsCustom ? i.tagsCustom : t; return '<span class="itag tc-' + t + '">' + l + '</span>'; }).join('');
        var top = document.createElement('div'); top.className = 'pcard-top';
        if (LOGOS[i.unit]) { var img = document.createElement('img'); img.src = LOGOS[i.unit]; img.style.cssText = 'width:18px;height:18px;border-radius:50%;object-fit:cover'; top.appendChild(img); }
        var un = document.createElement('span'); un.className = 'pcard-unit-name'; un.textContent = i.unit; top.appendChild(un);
        var ds = document.createElement('span'); ds.className = 'pcard-date'; ds.textContent = fmtDate(d) + ' 解決'; top.appendChild(ds);
        card.appendChild(top);
        var te = document.createElement('div'); te.innerHTML = tagsHtml; te.style.margin = '5px 0'; card.appendChild(te);
        var ct = document.createElement('div'); ct.className = 'pcard-content'; ct.textContent = i.content; card.appendChild(ct);
        var sols = i.solutions || [];
        if (sols.length) { var sd = document.createElement('div'); sd.style.cssText = 'margin-top:6px;font-size:12px;color:var(--gn);font-weight:600'; sd.textContent = '✓ ' + sols.length + ' 個解法'; card.appendChild(sd); }
        grid.appendChild(card);
      });
    }

    function openModal(id) { document.getElementById(id).classList.add('on'); }
    function closeModal(id) { document.getElementById(id).classList.remove('on'); }

    function saveSbKey() {
      var key = document.getElementById('sb-key-input').value.trim();
      if (!key) { toast('請輸入 Key', 'err'); return; }
      localStorage.setItem('ci_sb_key', key);
      SB_KEY = key; sb = supabase.createClient(SB_URL, SB_KEY);
      closeModal('modal-sb');
      document.getElementById('loading-lv').classList.remove('hide');
      loadIssues().then(function (ok) {
        document.getElementById('loading-lv').classList.add('hide');
        if (ok) { updateTabBadges(); renderReportOverview(); toast('連線成功！', 'ok'); }
      });
    }

    function toast(msg, type) {
      var t = document.getElementById('toast-el');
      t.textContent = msg; t.className = 'toast on ' + (type || '');
      setTimeout(function () { t.className = 'toast'; }, 3500);
    }

    async function init() {
      var ok = await loadIssues();
      document.getElementById('loading-lv').classList.add('hide');
      if (ok) { updateTabBadges(); renderReportOverview(); }
    }

    init();

  </script>
</body>

</html>
